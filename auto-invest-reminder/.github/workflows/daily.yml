name: 每日定投偏离度

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行定投偏离度脚本
        run: python combined_reminder.py

      - name: 提交日志保持仓库活跃
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ || true
          git diff --staged --quiet || git commit -m "📊 每日推送 $(date +%Y-%m-%d)"
          git push
