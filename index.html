  <style>
    :root {
      --primary: #8B2942;
      --primary-dark: #5C1E33;
      --primary-light: #F9EDF0;
      --gold: #C9A962;
      --gold-dark: #A68B4B;
      --red: #9B2D4A;
      --green: #2D5A3D;
      --bg: #f4f4f5;
      --card: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --text-secondary: #71717a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: var(--primary-dark);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sidebar-logo {
      width: 32px; height: 32px;
      background: var(--gold);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 18px; color: var(--primary-dark);
    }
    .sidebar h1 { font-size: 16px; font-weight: 700; }
    .sidebar p { font-size: 11px; opacity: 0.6; }
    .sidebar nav { flex: 1; padding: 16px; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-radius: 8px;
      color: rgba(255,255,255,0.7);
      text-decoration: none; font-size: 14px;
      transition: all 0.2s; margin-bottom: 4px;
    }
    .sidebar nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar nav a.active { background: var(--primary); color: var(--gold); }
    .sidebar-footer {
      padding: 16px; border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center; font-size: 11px; opacity: 0.5;
    }
    .sidebar.collapsed { width: 60px; overflow: hidden; }
    .sidebar.collapsed .sidebar-header { padding: 12px 8px; flex-direction: column; gap: 4px; }
    .sidebar.collapsed .sidebar-header > div:first-of-type { flex: unset; display: none; }
    .sidebar.collapsed h1, .sidebar.collapsed p { display: none; }
    .sidebar.collapsed .sidebar-logo { width: 28px; height: 28px; font-size: 14px; margin: 0 auto; }
    .sidebar.collapsed nav { padding: 8px; }
    .sidebar.collapsed nav a { justify-content: center; padding: 10px 8px; font-size: 0; white-space: nowrap; overflow: hidden; }
    .sidebar.collapsed nav a svg { flex-shrink: 0; width: 20px; height: 20px; }
    .sidebar.collapsed nav a span, .sidebar.collapsed nav a::after { display: none; }
    .sidebar.collapsed nav div { display: none; }
    .sidebar.collapsed .sidebar-footer { font-size: 9px; padding: 8px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar.collapsed .privacy-btn { width: 28px; height: 28px; }
    .sidebar.collapsed .sidebar-collapse-btn { margin: 0 auto; }
    .sidebar-collapse-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      color: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0; border-radius: 4px;
    }
    .sidebar-collapse-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .sidebar-collapse-btn svg { transition: transform 0.3s; }
    .sidebar.collapsed .sidebar-collapse-btn svg { transform: rotate(180deg); }
    .sidebar { transition: width 0.25s ease; }
    .sidebar .sidebar-header, .sidebar nav, .sidebar nav a, .sidebar-footer {
      transition: all 0.25s ease;
    }
    .main {
      flex: 1; overflow: auto; padding: 32px;
    }
    .page-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
    }
    .page-header h2 { font-size: 24px; font-weight: 700; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 18px; font-weight: 600; margin-bottom: 16px;
    }
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-card .value { font-size: 22px; font-weight: 700; font-family: 'Cascadia Code', 'JetBrains Mono', monospace; }
    .stat-card .trend { font-size: 13px; margin-top: 4px; }
    .chart-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;
    }
    .chart-container { position: relative; height: 340px; }
    .chart-container canvas { width: 100% !important; height: 100% !important; }
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; justify-content: center;
    }
    .chart-legend-item {
      display: flex; align-items: center; gap: 6px; font-size: 13px;
    }
    .chart-legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table {
      width: 100%; border-collapse: collapse; font-size: 14px; min-width: 700px;
    }
    thead th {
      text-align: left; padding: 12px 16px;
      background: #fafafa; border-bottom: 1px solid var(--border);
      color: var(--text-secondary); font-weight: 500; font-size: 13px;
    }
    tbody td {
      padding: 12px 16px; border-bottom: 1px solid #f4f4f5;
    }
    tbody tr:hover td { background: #fafafa; }
    .mono { font-family: 'Cascadia Code', 'JetBrains Mono', monospace; }
    .positive { color: var(--red); }
    .negative { color: var(--green); }
    .tag {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500;
    }
    .tag-primary { background: var(--primary-light); color: var(--primary-dark); }
    .tag-danger { background: #fef2f2; color: var(--red); }
    .tag-warning { background: #fefce8; color: #a16207; }
    .tag-success { background: #f0fdf4; color: #15803d; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px; border: none; border-radius: 8px;
      font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .hidden { display: none; }
    .risk-section {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;
    }
    .risk-box {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-radius: 8px; margin-bottom: 8px;
    }
    .progress-bar {
      width: 100%; height: 8px; background: #e4e4e7; border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px; transition: width 0.5s;
    }
    .top-stock-item {
      display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .top-stock-rank {
      width: 24px; height: 24px; border-radius: 50%;
      background: #e4e4e7; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .top-stock-info { flex: 1; }
    .top-stock-header {
      display: flex; justify-content: space-between; margin-bottom: 4px;
    }
    .top-stock-name { font-weight: 500; font-size: 14px; }
    .top-stock-pct { font-family: monospace; font-weight: 600; font-size: 14px; }
    .expand-btn {
      padding: 4px; border: none; background: none; cursor: pointer; color: var(--text-secondary);
      transition: transform 0.2s; display: inline-flex; align-items: center;
    }
    .expand-btn:hover { color: var(--text); }
    .detail-row td { padding: 0 !important; }
    .detail-content { padding: 12px 16px 12px 48px; background: #fafafa; }
    .detail-content table { font-size: 13px; }
    .detail-content th { font-size: 12px; padding: 6px 12px; }
    .detail-content td { padding: 6px 12px; }
    input[type="number"] {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139,41,66,0.1); }
    .alert {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 16px; border-radius: 12px; margin-bottom: 24px;
    }
    .alert-info { background: #eff6ff; border: 1px solid #bfdbfe; }
    .alert-info h4 { color: #1e40af; }
    .alert-info p, .alert-info li { color: #3b82f6; }
    .alert-warning { background: #fefce8; border: 1px solid #fde68a; }
    .alert-warning h4 { color: #92400e; }
    .alert-warning li { color: #a16207; }
    .alert svg { flex-shrink: 0; margin-top: 2px; }
    .privacy-btn {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
      background: #fff; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; flex-shrink: 0;
    }
    .privacy-btn:hover { background: #f4f4f5; }
    .privacy-btn.on { background: var(--primary); border-color: var(--primary); }
    .privacy-btn.on svg { stroke: #fff; }
    .privacy-hidden { filter: blur(7px); pointer-events: none; user-select: none; }
    body.privacy-mode .privacy-sensitive,
    body.privacy-mode canvas,
    body.privacy-mode #calcLogPanel,
    body.privacy-mode input[type="number"] {
      filter: blur(7px); pointer-events: none; user-select: none;
    }
    @media screen and (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100% !important; height: auto; position: relative; }
      .sidebar.collapsed { width: 100% !important; height: auto; }
      .sidebar.collapsed .sidebar-header { flex-direction: row; justify-content: space-between; padding: 8px 12px; }
      .sidebar.collapsed .sidebar-header > div:first-of-type { display: flex; align-items: center; gap: 8px; }
      .sidebar.collapsed .sidebar-logo { margin: 0; width: 24px; height: 24px; font-size: 12px; }
      .sidebar.collapsed h1 { display: block; font-size: 14px; }
      .sidebar.collapsed p { display: none; }
      .sidebar.collapsed nav { display: none; }
      .sidebar.collapsed .sidebar-footer { display: none; }
      .sidebar.collapsed .sidebar-collapse-btn { margin: 0; }
      .sidebar nav { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; }
      .sidebar nav a { flex: 1; min-width: calc(33.33% - 3px); justify-content: center; padding: 8px 6px; }
      .sidebar nav a span { font-size: 11px; }
      .main { padding: 10px; }
      .card { padding: 10px; margin-bottom: 8px; border-radius: 8px; }
      .card-title { font-size: 14px; margin-bottom: 6px; }
      .page-header { margin-bottom: 8px; }
      .page-header h2 { font-size: 16px; }
      table { font-size: 11px; min-width: 580px; }
      th, td { padding: 5px 4px; }
      .tag { font-size: 10px; padding: 1px 6px; }
    }
    @media screen and (max-width: 480px) {
      .sidebar nav a { min-width: calc(50% - 2px); }
      .main { padding: 8px; }
      .card { padding: 8px; }
      table { font-size: 10px; min-width: 520px; }
      .page-header h2 { font-size: 15px; }
      th, td { padding: 4px 3px; }
    }
    .upload-panel { display:none; }
    .upload-panel.show { display:block; }
    .upload-slot {
      border: 2px dashed var(--border); border-radius: 12px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; position: relative; min-height: 100px;
      display: flex; align-items: center; justify-content: center;
    }
    .upload-slot:hover { border-color: var(--primary); background: var(--primary-light); }
    .upload-slot.has-image { border-style: solid; border-color: var(--primary); padding: 0; }
    .upload-slot img { max-width: 100%; max-height: 200px; border-radius: 8px; object-fit: contain; }
    .upload-slot .placeholder { color: var(--text-secondary); font-size: 13px; }
    .upload-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 999;
      display: none; align-items: center; justify-content: center;
    }
    .upload-overlay.show { display: flex; }
    .upload-dialog {
      background: white; border-radius: 16px; padding: 32px;
      width: 90%; max-width: 640px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .btn-upload { background: var(--gold); color: var(--primary-dark); }
    .btn-upload:hover { background: var(--gold-dark); }
    .parse-status { padding: 8px 16px; border-radius: 8px; font-size: 13px; margin-top: 8px; }
    .parse-status.loading { background: #eff6ff; color: #2563eb; }
    .parse-status.success { background: #f0fdf4; color: #15803d; }

// ====== 计算函数 ======
function calcSummaries() {
  const total = data.douTotal + data.zeTotal;
  const tmap = {};
  Object.entries(data.fundTypeMapping).forEach(([t, codes]) => codes.forEach(c => tmap[c]=t));
  const typeMergeMap = { '沪深300': '300', '新能源车': '创业板+新能源' }; // 合并类型映射
  const cmap = {};
  data.funds.forEach(f => {
    let cat = tmap[f.code] || f.type;
    cat = typeMergeMap[cat] || cat; // 如果有合并映射，使用合并后的类型
    if (!cmap[cat]) cmap[cat] = { amount:0, codes:[] };
    cmap[cat].amount += f.amount;
    cmap[cat].codes.push(f.code);
  });
  return Object.entries(cmap).map(([cat, info]) => ({ cat, amount: info.amount, ratio: total>0 ? info.amount/total*100 : 0, codes: info.codes }))
    .sort((a,b) => b.amount - a.amount);
}

function calcConcentration() {
  const total = data.douTotal + data.zeTotal;
  const fmap = {};
  data.funds.forEach(f => {
    if (!fmap[f.code]) fmap[f.code] = { name: f.name, amount: 0 };
    fmap[f.code].amount += f.amount;
  });
  data.stocks.forEach(s => {
    if (!fmap[s.code]) fmap[s.code] = { name: s.name, amount: 0 };
    fmap[s.code].amount += s.amount;
  });

  const logs = [];
  logs.push('=== 总资产 ===');
  logs.push('豆总资产 = ¥' + data.douTotal.toFixed(2));
  logs.push('泽总资产 = ¥' + data.zeTotal.toFixed(2));
  logs.push('总资产 = ¥' + total.toFixed(2));
  logs.push('funds合计 = ¥' + data.funds.reduce((s,f) => s+f.amount, 0).toFixed(2));
  logs.push('stocks合计 = ¥' + data.stocks.reduce((s,st) => s+st.amount, 0).toFixed(2));

  logs.push('\n=== 各基金/ETF权重 ===');
  Object.entries(fmap).forEach(([code, info]) => {
    logs.push(code + ' ' + info.name + ': ¥' + info.amount.toFixed(2) + ' → 权重 ' + (info.amount/total*100).toFixed(2) + '%');
  });

  const smap = {};
  Object.entries(data.fundHoldings).forEach(([fc, holdings]) => {
    const fund = fmap[fc]; if (!fund) return;
    const w = fund.amount / (total||1);
    logs.push('\n--- ' + fc + ' ' + fund.name + ' (权重' + (w*100).toFixed(2) + '%) ---');
    holdings.forEach(h => {
      if (!smap[h.code]) smap[h.code] = { name: h.name, total: 0, sources: [] };
      const contribution = h.ratio * w;
      smap[h.code].total += contribution;
      smap[h.code].sources.push({ fundCode: fc, fundName: fund.name, ratio: contribution });
      logs.push('  ' + h.name + '(' + h.code + '): ' + h.ratio + '% × ' + (w*100).toFixed(2) + '% = ' + (contribution).toFixed(3) + '%');
    });
  });

  logs.push('\n=== 前10大集中度排名 ===');
  const result = Object.entries(smap).map(([code, info]) => ({ code, name: info.name, total: info.total, sources: info.sources }))
    .sort((a,b) => b.total - a.total);
  result.slice(0, 10).forEach((s, i) => {
    logs.push((i+1) + '. ' + s.name + '(' + s.code + '): ' + s.total.toFixed(3) + '%');
    s.sources.forEach(src => {
      logs.push('     ← ' + src.fundName + '(' + src.fundCode + '): ' + src.ratio.toFixed(3) + '%');
    });
  });
  window.__calcLog = logs.join('\n');

  return result;
}

function fmt(n) { return n.toLocaleString('zh-CN', { minFrac:2, maxFrac:2 }); }

function fmtRatio(n) { return n.toFixed(2) + '%'; }

function getAdjusted(code, amount, profit, profitRate) {
  const adj = data.clearedAdjustments[code];
  if (!adj) return { profit, profitRate };
  const newProfit = profit - adj.amount;
  const cost = amount - profit;
  const newRate = cost > 0 ? (newProfit / cost) * 100 : 0;
  return { profit: newProfit, profitRate: newRate };
}

// ====== Canvas 图表 ======
const COLORS = ['#8B2942','#A03550','#B84D66','#C96B7D','#D68A97','#C9A962','#D4B87A','#DEC896','#A68B4B','#8A7340'];

function drawPie(canvas, data) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const cx = w/2, cy = h/2, r = Math.min(w, h)/2.5;

  ctx.clearRect(0,0,w,h);
  const total = data.reduce((s,d) => s+d.value, 0);
  if (total === 0) return;

  let start = -Math.PI/2;
  data.forEach((d, i) => {
    const angle = (d.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start+angle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // Label
    const mid = start + angle/2;
    const lr = r * 0.65;
    const lx = cx + Math.cos(mid) * lr;
    const ly = cy + Math.sin(mid) * lr;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const pct = (d.value / total * 100).toFixed(1);
    if (pct > 5) ctx.fillText(pct + '%', lx, ly);

    start += angle;
  });

  // Center hole
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.35, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function drawBar(canvas, data) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { t: 20, r: 20, b: 40, l: 60 };
  const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

  ctx.clearRect(0,0,w,h);
  if (data.length === 0) return;

  const maxV = Math.max(...data.map(d => d.value));
  const gap = cw / data.length;
  const bw = Math.min(gap * 0.7, 40);

  // Y axis
  ctx.strokeStyle = '#e4e4e7';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#71717a';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText('¥' + ((maxV * i / 4) / 10000).toFixed(0) + '万', pad.l - 8, y);
  }

  // Bars
  data.forEach((d, i) => {
    const x = pad.l + i * gap + (gap - bw) / 2;
    const bh = d.value / maxV * ch;
    const y = pad.t + ch - bh;

    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.beginPath();
    ctx.roundRect(x, y, bw, bh, [4,4,0,0]);
    ctx.fill();

    // Label
    ctx.fillStyle = '#18181b';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(d.label, x + bw/2, pad.t + ch + 8);
  });
}

function toggleAccountDropdown() {
  const dropdown = document.getElementById('accountDropdown');

  if (dropdown && arrow) {
    const isOpen = dropdown.style.display !== 'none';
    dropdown.style.display = isOpen ? 'none' : 'block';
    arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
  }
}

  const dropdown = document.getElementById('accountDropdown');
  const arrow = document.getElementById('dropdownArrow');
  if (dropdown) dropdown.style.display = 'none';
  if (arrow) arrow.style.transform = 'rotate(0deg)';
}

  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('accountDropdown');

    const histButton = document.querySelector('#content .dropdown button');

});

    const route = getRoute();
    const content = document.getElementById('content');
    
    document.querySelectorAll('.sidebar nav a').forEach(a => {
      const href = a.getAttribute('href').replace('#', '') || '/';

// ====== 隐私模式 ======
function togglePrivacy() {
  const on = localStorage.getItem('portfolio_privacy') !== '1';
  localStorage.setItem('portfolio_privacy', on ? '1' : '0');
  applyPrivacy();
}

function applyPrivacy() {
  const on = localStorage.getItem('portfolio_privacy') === '1';
  const btn = document.getElementById('privacyToggle');
  if (btn) {
    btn.classList.toggle('on', on);
    if (on) {
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
    }
  }
  document.body.classList.toggle('privacy-mode', on);
  if (on) applyPrivacyBlur(); else removePrivacyBlur();
}

function applyPrivacyBlur() {
  removePrivacyBlur();
  const content = document.getElementById('content');
  if (!content) return;
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
  const processed = new Set();
  let node;
  while (node = walker.nextNode()) {
    if (/¥\s*\d/.test(node.textContent)) {
      const p = node.parentElement;
      if (p && !processed.has(p)) {
        p.classList.add('privacy-sensitive');
        processed.add(p);
      }
    }
  }
  document.querySelectorAll('#content canvas').forEach(c => c.classList.add('privacy-sensitive'));
  const panel = document.getElementById('calcLogPanel');
  if (panel) panel.classList.add('privacy-sensitive');
}

function removePrivacyBlur() {
  document.querySelectorAll('.privacy-sensitive').forEach(el => el.classList.remove('privacy-sensitive'));
}

function isPrivate() {
  return localStorage.getItem('portfolio_privacy') === '1';
}

// ====== 图片管理 ======
function getImageStore() {
  try {
    const store = localStorage.getItem('portfolio_images');
    return store ? JSON.parse(store) : {};
  } catch(e) {
    return {};
  }
}

function saveImageStore(store) {
  localStorage.setItem('portfolio_images', JSON.stringify(store));
}

function getImagesForDate(dateStr) {
  const store = getImageStore();
  return store[dateStr] || [];
}

function saveImageForDate(dateStr, imageType, dataUrl, fileName) {
  const store = getImageStore();
  if (!store[dateStr]) store[dateStr] = [];
  
  // 查找并替换同类型的图片，或者添加新图片
  const existingIndex = store[dateStr].findIndex(img => img.type === imageType);
  const newImage = {
    id: Date.now() + '_' + Math.random().toString(36).substr(2, 9),
    type: imageType,
    dataUrl: dataUrl,
    fileName: fileName,
    uploadTime: new Date().toISOString(),
    size: dataUrl.length
  };
  
  if (existingIndex >= 0) {
    store[dateStr][existingIndex] = newImage;
  } else {
    store[dateStr].push(newImage);
  }
  
  saveImageStore(store);
  return newImage;
}

function deleteImageForDate(dateStr, imageId) {
  const store = getImageStore();
  if (!store[dateStr]) return false;
  
  store[dateStr] = store[dateStr].filter(img => img.id !== imageId);
  
  if (store[dateStr].length === 0) {
    delete store[dateStr];
  }
  
  saveImageStore(store);
  return true;
}

function exportImageAsFile(imageData) {
  const byteString = atob(imageData.dataUrl.split(',')[1]);
  const mimeString = imageData.dataUrl.split(',')[0].split(':')[1].split(';')[0];
  const ab = new ArrayBuffer(byteString.length);
  const ia = new Uint8Array(ab);
  for (let i = 0; i < byteString.length; i++) {
    ia[i] = byteString.charCodeAt(i);
  }
  const blob = new Blob([ab], { type: mimeString });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = imageData.fileName;
  a.click();
  URL.revokeObjectURL(url);
}

function uploadImage(imageType, dateStr) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    if (e.target.files && e.target.files[0]) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = (event) => {
        saveImageForDate(dateStr, imageType, event.target.result, file.name);
        renderImageManagerView();
      };
      reader.readAsDataURL(file);
    }
  };
  input.click();
}

function replaceImage(imageType, dateStr) {
  uploadImage(imageType, dateStr);
}

function deleteImage(imageId, dateStr) {
  if (confirm('确定要删除这张图片吗？此操作不可恢复。')) {

// 初始化时保存历史快照（每次都覆盖当天数据）
function initHistory() {
  const today = new Date().toISOString().slice(0, 10);
  
  // 用预置初始快照播种历史数据（如果缺少任何初始快照日期，补充进去）
  let history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  if (data.initialSnapshots) {
    Object.keys(data.initialSnapshots).forEach(date => {
      if (!history[date]) {
        history[date] = data.initialSnapshots[date];
      }
    });
    if (Object.keys(history).length > 0) {
      localStorage.setItem('portfolio_history', JSON.stringify(history));
    }
  }
  
  // 若 localStorage 中没有 douTotal/zeTotal，从历史最近值带入
  if (!localStorage.getItem('portfolio_douTotal') || !localStorage.getItem('portfolio_zeTotal')) {
    const dates = Object.keys(history).sort().reverse();
    if (dates.length > 0) {
      const lastSnap = history[dates[0]];
      if (lastSnap) {
        if (!localStorage.getItem('portfolio_douTotal') && lastSnap.douTotal) {
          data.douTotal = lastSnap.douTotal;
          localStorage.setItem('portfolio_douTotal', lastSnap.douTotal);
        }
        if (!localStorage.getItem('portfolio_zeTotal') && lastSnap.zeTotal) {
          data.zeTotal = lastSnap.zeTotal;
          localStorage.setItem('portfolio_zeTotal', lastSnap.zeTotal);
        }
      }
    }
  }
  
  saveHistorySnapshot(today);
  // 更新侧边栏日期显示
  history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  const dates = Object.keys(history).sort();
  if (dates.length > 0) {
    const el = document.getElementById('sidebarFooter');
    if (el) el.textContent = '数据更新日期: ' + dates[dates.length - 1];
  }
}

    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'portfolio_backup_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('导出失败：' + e.message + '\n请检查浏览器是否支持文件下载');
  }
}

function validateDataIntegrity() {
  const warnings = [];
  if (!data.funds || !Array.isArray(data.funds) || data.funds.length === 0) {
    warnings.push('场外基金数据为空');
  }
  if (!data.stocks || !Array.isArray(data.stocks) || data.stocks.length === 0) {
    warnings.push('场内股票数据为空');
  }
  if (typeof data.douTotal !== 'number' || isNaN(data.douTotal) || data.douTotal <= 0) {
    warnings.push('豆总资产数据异常：' + data.douTotal);
  }
  if (typeof data.zeTotal !== 'number' || isNaN(data.zeTotal) || data.zeTotal <= 0) {
    warnings.push('泽总资产数据异常：' + data.zeTotal);
  }
  const has511880 = data.stocks.some(s => s.code === '511880');
  if (!has511880) {
    warnings.push('缺少银华日利(511880)持仓数据');
  }
  return warnings;
}

  }

  const snapshots = dates.map(d => {
    const snap = loadSnapshot(d);
    const totalFunds = snap.funds.reduce((s,f) => s+f.amount, 0);
    const cashStock = snap.stocks.find(s => s.code === '511880');
    const cashStockAmt = cashStock ? cashStock.amount : 0;
    const totalStocks = snap.stocks.filter(s => s.code !== '511880').reduce((s,st) => s+st.amount, 0);
    const douTotal = snap.douTotal || 1278618.04;
    const zeTotal = snap.zeTotal || 532240.37;
    const total = douTotal + zeTotal;
    const totalHoldings = totalFunds + totalStocks;
    const totalCash = Math.max(0, total - totalHoldings - cashStockAmt);
    const totalProfit = snap.funds.reduce((s,f) => s+f.profit, 0) + snap.stocks.reduce((s,st) => s+st.profit, 0);
    return { date: d, totalFunds, totalStocks, cashStockAmt, totalCash, total, totalProfit };});

  container.innerHTML = `
    <div class="page-header"><h2>历史概览</h2></div>
    <div class="card">
      <div class="card-title">总资产趋势</div>
      <div class="chart-container" style="height:300px">
        <canvas id="trendChart" style="${snapshots.length < 2 ? 'display:none' : ''}"></canvas>
        <div id="trendEmptyMsg" style="${snapshots.length >= 2 ? 'display:none' : 'display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);font-size:14px'}">${snapshots.length === 0 ? '暂无历史数据，保存快照后趋势图将自动生成' : '需要至少2天数据才能生成趋势图，明天再来查看'}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">历史汇总 <span style="font-size:13px;font-weight:400;color:var(--text-secondary)">（共 ${snapshots.length} 条记录）</span></div>
      <div class="table-scroll"><table><thead><tr>
        <th>日期</th><th class="text-right">总资产</th><th class="text-right">现金</th><th class="text-right">总收益</th>
      </tr></thead><tbody>
        ${snapshots.map(s => `<tr>
          <td class="mono">${s.date}</td>
          <td class="text-right mono" style="font-weight:600">¥${(s.total/10000).toFixed(2)}万</td>
          <td class="text-right mono">¥${fmt(s.totalCash)}</td>
          <td class="text-right mono ${s.totalProfit>=0?'positive':'negative'}">¥${(s.totalProfit/10000).toFixed(2)}万</td>
        </tr>`).join('')}
      </tbody></table></div>
    </div>
  `;

  // 画趋势图
  if (snapshots.length >= 2) {
    requestAnimationFrame(() => {
    const canvas = document.getElementById('trendChart');
    if (!canvas) return;
    // 确保 canvas 可见才能取到正确尺寸
    const origDisplay = canvas.style.display;
    canvas.style.display = 'block';
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;
    const pad = { t: 30, r: 20, b: 50, l: 80 };
    const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

    ctx.clearRect(0, 0, w, h);
    const vals = snapshots.map(s => s.total);
    const maxV = Math.max(...vals);
    const minV = Math.min(...vals);
    const range = maxV - minV || 1;

    // 网格
    ctx.strokeStyle = '#e4e4e7';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.t + ch - (ch * i / 4);
      ctx.beginPath();
      ctx.moveTo(pad.l, y);
      ctx.lineTo(w - pad.r, y);
      ctx.stroke();
      ctx.fillStyle = '#71717a';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText('¥' + ((minV + range * i / 4) / 10000).toFixed(1) + '万', pad.l - 8, y);
    }

    // 折线
    const gap = cw / (snapshots.length - 1);
    ctx.beginPath();
    ctx.strokeStyle = '#8B2942';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    snapshots.forEach((s, i) => {
      const x = pad.l + i * gap;
      const y = pad.t + ch - ((s.total - minV) / range) * ch;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 填充渐变色
    ctx.lineTo(pad.l + (snapshots.length - 1) * gap, pad.t + ch);
    ctx.lineTo(pad.l, pad.t + ch);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
    grad.addColorStop(0, 'rgba(139,41,66,0.15)');
    grad.addColorStop(1, 'rgba(139,41,66,0.01)');
    ctx.fillStyle = grad;
    ctx.fill();

    // 数据点 + 标签
    snapshots.forEach((s, i) => {
      const x = pad.l + i * gap;
      const y = pad.t + ch - ((s.total - minV) / range) * ch;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#8B2942';
      ctx.fill();
      ctx.fillStyle = '#18181b';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(s.date.slice(5), x, pad.t + ch + 8);
    });
    });
  }
}

  const douTotal = snap.douTotal || 1278618.04;

  const total = douTotal + zeTotal;
  const totalHoldings = totalFunds + totalStocks;

  const totalProfit = snap.funds.reduce((s,f) => s+f.profit, 0) + snap.stocks.reduce((s,st) => s+st.profit, 0);

  const container = document.getElementById('historyDetailView');

  const typeLookup = {};
  Object.entries(data.fundTypeMapping).forEach(([cat, codes]) => {
    codes.forEach(code => { typeLookup[code] = cat; });
  });

  const mergeMap = { '163407': '510300' };
  const merged = {};
  function addItem(code, name, amount, profit, profitRate) {
    const targetCode = mergeMap[code] || code;
    if (!merged[targetCode]) merged[targetCode] = { code: targetCode, name: name, amount: 0, profit: 0, profitRate: 0, count: 0 };
    const m = merged[targetCode];
    m.amount += amount;
    m.profit += profit;
    m.profitRate += profitRate;
    m.count += 1;
  }
  snap.funds.forEach(f => {
    const adj = getAdjusted(f.code, f.amount, f.profit, f.profitRate);
    addItem(f.code, f.name, f.amount, adj.profit, adj.profitRate);

  snap.stocks.forEach(s => {
    if (s.code === '511880') return;
    const adj = getAdjusted(s.code, s.amount, s.profit, s.profitRate);

function validateParsedData(parsed) {
  const errors = [];
  const warnings = [];

  if (!parsed.douTotal || isNaN(parsed.douTotal)) {
    errors.push('未提取到豆账户总资产');
  } else if (parsed.douTotal < 10000 || parsed.douTotal > 100000000) {
    errors.push('豆账户总资产金额异常：' + parsed.douTotal);
  }

  if (!parsed.zeTotal || isNaN(parsed.zeTotal)) {
    errors.push('未提取到泽账户总资产');
  } else if (parsed.zeTotal < 10000 || parsed.zeTotal > 100000000) {
    errors.push('泽账户总资产金额异常：' + parsed.zeTotal);
  }

  if (!parsed.funds || !Array.isArray(parsed.funds) || parsed.funds.length === 0) {
    errors.push('未提取到场外基金持仓数据');
  } else {
    if (parsed.funds.length < 3) warnings.push('场外基金数量偏少（' + parsed.funds.length + '只），请确认截图完整性');
    parsed.funds.forEach((f, i) => {
      if (!f.code || !f.name) errors.push('场外基金第' + (i+1) + '条缺少代码或名称');
      if (!f.amount || isNaN(f.amount)) errors.push('场外基金"' + (f.name||'未知') + '"缺少持仓金额');
      if (typeof f.profit === 'undefined' || isNaN(f.profit)) errors.push('场外基金"' + (f.name||'未知') + '"缺少持仓收益');
    });
  }

  if (!parsed.stocks || !Array.isArray(parsed.stocks) || parsed.stocks.length === 0) {
    errors.push('未提取到场内持仓数据');
  } else {
    var has511880 = parsed.stocks.some(function(s) { return s.code === '511880'; });
    if (!has511880) warnings.push('场内持仓中未找到银华日利(511880)，现金计算可能不准确');
    parsed.stocks.forEach(function(s, i) {
      if (!s.code || !s.name) errors.push('场内持仓第' + (i+1) + '条缺少代码或名称');
      if (!s.amount || isNaN(s.amount)) errors.push('场内持仓"' + (s.name||'未知') + '"缺少持仓金额');
    });
    var totalHoldings = (parsed.funds||[]).reduce(function(s,f){return s+(f.amount||0);},0) + 
      parsed.stocks.reduce(function(s,st){return s+(st.amount||0);},0);
    var total = (parsed.douTotal||0) + (parsed.zeTotal||0);
    if (total > 0 && totalHoldings > total * 1.3) {
      errors.push('持仓总金额超出总资产30%以上，数据可能存在错误');
    }
  }

  return { valid: errors.length === 0, errors: errors, warnings: warnings };
}

function saveHistorySnapshotForDate(dateStr, parsed, images) {
  var history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  history[dateStr] = {
    funds: parsed.funds || [],
    stocks: parsed.stocks || [],
    douTotal: parsed.douTotal || 0,
    zeTotal: parsed.zeTotal || 0,
    snapshotDate: dateStr,
    images: images.map(function(img) { return { id: 'hist_' + Date.now() + '_' + Math.random().toString(36).substr(2,6), type: 'upload', dataUrl: img.dataUrl, fileName: img.name, uploadTime: new Date().toISOString(), size: img.dataUrl.length }; })
  };
  localStorage.setItem('portfolio_history', JSON.stringify(history));
}

async function doParsing(uploadImages, statusElId, btnId, targetDate, closeCb) {
  var statusEl = document.getElementById(statusElId);
  var btnEl = document.getElementById(btnId);
  statusEl.innerHTML = '<div class="parse-status loading">⏳ 正在调用 qwen-vl-max 解析 ' + uploadImages.length + ' 张图片，请稍候...</div>';
  btnEl.disabled = true;

  try {
    var promptText = '你是一个严格的金融数据提取工具。请从下面的截图图片中提取持仓数据。\n\n需要提取的信息：\n1. 从持仓明细截图（表格形式，含代码/名称/金额/收益/收益率列）中提取所有基金和股票的持仓数据\n2. 从豆账户总资产截图中提取总资产金额（最大金额数字，通常格式为1,278,618.04）\n3. 从泽账户总资产截图中提取总资产金额\n\n请严格按以下JSON格式返回（不要任何其他文字）：\n{\n  "douTotal": 数字,\n  "zeTotal": 数字,\n  "funds": [{"code":"6位代码","name":"名称","type":"类型","amount":数字,"profit":数字,"profitRate":数字}],\n  "stocks": [{"code":"6位代码","name":"名称","shares":数字,"price":数字,"amount":数字,"profit":数字,"profitRate":数字}]\n}\n\n类型映射规则：代码162开头=医疗，501开头=新能源车，含300的代码=沪深300，161725=白酒，159915=创业板+新能源，513050=中概互联，510500/515000=信息+500，511880=现金。\n\n如果某类数据不存在，对应字段返回空数组或null。';

    // 构建content块：文本+图片
    var contentBlocks = [{ text: promptText }];
    for (var i = 0; i < uploadImages.length; i++) {
      contentBlocks.push({ image: uploadImages[i].dataUrl });
    }

    // 尝试代理优先，失败则直连DashScope
    var response, json;

    try {
      response = await fetch('/api/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: contentBlocks })
      });
    } catch(proxyErr) {
      response = null;
    }

    if (!response || !response.ok) {
      // 代理不可用，直接调DashScope
      if (!response) console.log('代理不可用，直连DashScope');
      var apiBody = JSON.stringify({
        model: 'qwen-vl-max',
        input: { messages: [{ role: 'user', content: contentBlocks }] },
        parameters: { result_format: 'message', max_tokens: 4096 }
      });
      response = await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer sk-60fea88b4446412e9db33ac6e5b14b64'
        },
        body: apiBody
      });

      if (!response.ok) {
        var errText = '';
        try { errText = await response.text(); } catch(ex) {}
        throw new Error('DashScope API 请求失败 HTTP ' + response.status + ':\n' + errText.substring(0, 500));
      }
    }

    json = await response.json();

    // 处理代理返回的错误
    if (json.error) {
      throw new Error('API 错误: ' + json.error);
    }

    // 处理DashScope返回的错误码
    if (json.code) {
      throw new Error('DashScope错误 [' + json.code + ']: ' + (json.message || '未知错误').substring(0, 300));
    }

    var choices = json.output && json.output.choices;
    if (!choices || !choices.length) {
      throw new Error('API 返回格式异常，无 choices:\n' + JSON.stringify(json).substring(0, 300));
    }

    var assistantContent = choices[0].message.content;
    var replyText = '';

    if (Array.isArray(assistantContent)) {
      for (var m = 0; m < assistantContent.length; m++) {
        if (assistantContent[m].text) replyText += assistantContent[m].text;
      }
    } else if (typeof assistantContent === 'string') {
      replyText = assistantContent;
    } else {
      throw new Error('无法解析模型返回的 content 格式:\n' + JSON.stringify(assistantContent).substring(0, 300));
    }

    if (!replyText) {
      throw new Error('模型返回了空内容，请重试');
    }
    var jsonMatch = replyText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('解析失败：未找到有效JSON响应。\n响应内容:\n' + replyText.substring(0, 200));

    var parsed = JSON.parse(jsonMatch[0]);
    var validation = validateParsedData(parsed);

    if (!validation.valid) {
      var errHtml = '<div class="parse-status error"><strong>数据校验不通过，以下内容缺失或异常：</strong><br>';
      validation.errors.forEach(function(e) { errHtml += '❌ ' + e + '<br>'; });
      if (validation.warnings.length > 0) {
        errHtml += '<br><strong>警告：</strong><br>';
        validation.warnings.forEach(function(w) { errHtml += '⚠ ' + w + '<br>'; });
      }
      errHtml += '<br><small>请检查上传的截图是否完整，补充缺失的图片后重新上传</small></div>';
      statusEl.innerHTML = errHtml;
      btnEl.disabled = false;
      return;
    }

    // 更新 data
    if (parsed.douTotal && !isNaN(parsed.douTotal)) {
      data.douTotal = parsed.douTotal;
      localStorage.setItem('portfolio_douTotal', parsed.douTotal);
    }
    if (parsed.zeTotal && !isNaN(parsed.zeTotal)) {
      data.zeTotal = parsed.zeTotal;
      localStorage.setItem('portfolio_zeTotal', parsed.zeTotal);
    }
    if (parsed.funds && Array.isArray(parsed.funds) && parsed.funds.length > 0) {
      data.funds = parsed.funds;
    }
    if (parsed.stocks && Array.isArray(parsed.stocks) && parsed.stocks.length > 0) {
      data.stocks = parsed.stocks;
    }

    saveHistorySnapshotForDate(targetDate, parsed, uploadImages);

    // 如果是当天，也保存到 localStorage 的日期缓存
    var today = new Date().toISOString().slice(0, 10);
    if (targetDate === today) {
      saveHistorySnapshot(today);
    }

    var msg = '更新日期：' + targetDate + '<br>';
    if (parsed.douTotal) msg += '豆总资产: ¥' + parsed.douTotal.toLocaleString() + '<br>';
    if (parsed.zeTotal) msg += '泽总资产: ¥' + parsed.zeTotal.toLocaleString() + '<br>';
    if (parsed.funds && parsed.funds.length > 0) msg += '提取到场外基金 ' + parsed.funds.length + ' 条<br>';
    if (parsed.stocks && parsed.stocks.length > 0) msg += '提取到场内持仓 ' + parsed.stocks.length + ' 条<br>';
    if (validation.warnings.length > 0) {
      msg += '<br><small>⚠ ' + validation.warnings.join(' | ') + '</small>';
    }

    statusEl.innerHTML = '<div class="parse-status success">✅ 校验通过，数据已更新！<br>' + msg + '<br><small>页面即将刷新...</small></div>';

    setTimeout(function() {
      if (closeCb) closeCb();
      uploadImages.length = 0;
      render();
    }, 1500);

  } catch(e) {
    statusEl.innerHTML = '<div class="parse-status error">❌ ' + e.message + '</div>';
  } finally {
    btnEl.disabled = false;
  }
}

function startParsing() {
  if (uploadedImages.length === 0) {
    document.getElementById('uploadStatus').innerHTML = '<div class="parse-status error">请先上传至少一张截图</div>';
    return;
  }
  doParsing(uploadedImages, 'uploadStatus', 'btnParse', new Date().toISOString().slice(0, 10), closeUploadPanel);
}

function startHistoryParsing() {
  var dateEl = document.getElementById('historyUploadDate');
  var targetDate = dateEl ? dateEl.value : '';
  if (!targetDate) {
    document.getElementById('historyUploadStatus').innerHTML = '<div class="parse-status error">请先选择指定的历史日期</div>';
    return;
  }
  if (historyUploadedImages.length === 0) {
    document.getElementById('historyUploadStatus').innerHTML = '<div class="parse-status error">请先上传至少一张截图</div>';
    return;
  }
  doParsing(historyUploadedImages, 'historyUploadStatus', 'btnHistoryParse', targetDate, closeHistoryUploadPanel);
}

// Init
function debounce(fn, ms) {
  let timer;
  return function() { clearTimeout(timer); timer = setTimeout(fn, ms); };
}
window.addEventListener('hashchange', debounce(render, 50));
