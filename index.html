// ====== 日志客户端 ======
(function() {
  var logQueue = [];
  var sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);

  function sendLog(entry) {
    entry.session = sessionId;
    entry.ts = new Date().toISOString();
    logQueue.push(entry);
    if (logQueue.length >= 5) flushLogs();
    // 本地备份：同时写入 localStorage（生产环境无后端时日志不丢失）
    saveToLocalLog(entry);
  }

  function flushLogs() {
    if (logQueue.length === 0) return;
    var batch = logQueue.splice(0);
    try {
      fetch('/api/log/report', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(batch),
        keepalive: true
      }).then(function(r) {
        if (r.ok) clearLocalLogs();
      }).catch(function(){});
    } catch(e) {}
  }

  var LOCAL_LOG_KEY = 'portfolio_client_logs';
  var MAX_LOCAL_LOGS = 3000;

  function saveToLocalLog(entry) {
    try {
      var raw = localStorage.getItem(LOCAL_LOG_KEY);
      var logs = raw ? JSON.parse(raw) : [];
      logs.push(entry);
      if (logs.length > MAX_LOCAL_LOGS) logs = logs.slice(-MAX_LOCAL_LOGS);
      localStorage.setItem(LOCAL_LOG_KEY, JSON.stringify(logs));
    } catch(e) {}
  }

  function clearLocalLogs() {
    try { localStorage.removeItem(LOCAL_LOG_KEY); } catch(e) {}
  }

  // 暴露读取接口，供 Playwright 或开发者工具调用
  window.getClientLogs = function(category, level, limit) {
    try {
      var raw = localStorage.getItem(LOCAL_LOG_KEY);
      var logs = raw ? JSON.parse(raw) : [];
      if (category) logs = logs.filter(function(l) { return l.category === category; });
      if (level) logs = logs.filter(function(l) { return l.level === level; });
      if (limit) logs = logs.slice(-limit);
      return logs;
    } catch(e) { return []; }
  };

  // 页面关闭时刷新
  window.addEventListener('beforeunload', flushLogs);
  // 每30秒自动刷新
  setInterval(flushLogs, 30000);

  // 全局JS错误捕获
  window.addEventListener('error', function(e) {
    sendLog({
      level: 'ERROR',
      source: 'client',
      category: 'error',
      message: e.message,
      meta: {
        filename: e.filename || '',
        lineno: e.lineno || 0,
        colno: e.colno || 0,
        stack: (e.error && e.error.stack) ? e.error.stack.substring(0, 500) : ''
      }
    });
  });

  // unhandled promise 拒绝
  window.addEventListener('unhandledrejection', function(e) {
    sendLog({
      level: 'ERROR',
      source: 'client',
      category: 'error',
      message: 'Unhandled Promise Rejection: ' + (e.reason ? (e.reason.message || String(e.reason)) : 'unknown'),
      meta: { stack: (e.reason && e.reason.stack) ? e.reason.stack.substring(0, 500) : '' }
    });
  });

  // 暴露给业务代码
  window.clientLog = function(level, category, message, meta) {
    sendLog({
      level: level || 'INFO',
      source: 'client',
      category: category || 'general',
      message: message,
      meta: meta || {}
    });
  };

  window.logPerf = function(category, duration_ms, meta) {
    sendLog({
      level: 'INFO',
      source: 'client',
      category: 'perf',
      message: category + ': ' + duration_ms + 'ms',
      duration_ms: duration_ms,
      meta: meta || {}
    });
  };

  window.logData = function(action, meta) {
    sendLog({
      level: 'INFO',
      source: 'client',
      category: 'data',
      message: action,
      meta: meta || {}
    });
  };

  window.logAudit = function(action, meta) {
    sendLog({
      level: 'INFO',
      source: 'client',
      category: 'audit',
      message: action,
      meta: meta || {}
    });
  };
})();

// ETF纠正：将 fundHoldings 中定义的 ETF 从 stocks 移入 funds（3处共用）
function correctETFClassification(funds, stocks) {
  var etfFromStocks = [];
  var newStocks = stocks.filter(function(s) {
    if (KNOWN_FUND_CODES[s.code]) {
      etfFromStocks.push(s);
      return false;
    }
    return true;
  }).map(function(s) {
    // 深复制个股对象，避免修改原始数据
    return { code: s.code, name: s.name, type: s.type, amount: s.amount, profit: s.profit, profitRate: s.profitRate };
  });
  // 深复制 funds 对象，避免修改原始数据
  var newFunds = funds.map(function(f) {
    return { code: f.code, name: f.name, type: f.type, amount: f.amount, profit: f.profit, profitRate: f.profitRate };
  });
  etfFromStocks.forEach(function(etf) {
    var existing = newFunds.find(function(f) { return f.code === etf.code; });
    if (!existing) {
      newFunds.push({
        code: etf.code, name: etf.name,
        type: HARDCODED_TYPE_MAP[etf.code] || 'ETF',
        amount: etf.amount || 0, profit: etf.profit || 0,
        profitRate: etf.profitRate || 0
      });
    } else {
      existing.amount += (etf.amount || 0);
      existing.profit = (existing.profit || 0) + (etf.profit || 0);
    }
  });
  return { funds: newFunds, stocks: newStocks };
}

function addItem(merged, code, name, amount, origProfit, adjProfit, mergeMap) {

  var isMergedCode = (mergeMap[code] !== undefined);
  if (!merged[targetCode]) merged[targetCode] = { code: targetCode, name: name, amount: 0, profit: 0, origCost: 0 };
  var m = merged[targetCode];
  amount = amount || 0;
  origProfit = origProfit || 0;
  adjProfit = adjProfit || 0;
  if (m.origCost > 0 && !isMergedCode) {
    m.amount = Math.max(m.amount, amount);
  } else {
    m.amount += amount;
  }
  m.profit += adjProfit;
  m.origCost += (amount - origProfit);
}

  data.funds.forEach(f => {
    let cat = tmap[f.code] || f.type;
    cat = data.typeMergeMapping[cat] || cat;
    if (!cmap[cat]) cmap[cat] = { amount:0, codes:[] };
    cmap[cat].amount += f.amount;
    cmap[cat].codes.push(f.code);
  });
  return Object.entries(cmap).map(([cat, info]) => ({ cat, amount: info.amount, ratio: total>0 ? info.amount/total*100 : 0, codes: info.codes }))
    .sort((a,b) => b.amount - a.amount);
}

function calcConcentration() {
  const total = (data.douTotal + data.zeTotal) || 1;
  const fmap = {};
  // 先构建基金 map（ETF/LOF 已通过 correctETFClassification 合并）
  data.funds.forEach(f => {
    if (f.code === '511880') return;  // 排除货币ETF
    if (!fmap[f.code]) fmap[f.code] = { name: f.name, amount: 0 };
    fmap[f.code].amount += f.amount;
  });
  // stocks 中只剩真实个股：同一代码出现多次时金额累加（如同一股票被AI识别出多条记录）
  data.stocks.forEach(s => {
    if (s.code === '511880') return;  // 排除货币ETF
    if ((s.code || '').startsWith('OTHER_')) return;  // 过滤AI幻觉股票
    if (/ETF|LOF|指数|联接|货币/.test(s.name || '')) return;  // 双重保险
    if (!fmap[s.code]) fmap[s.code] = { name: s.name, amount: 0 };
    fmap[s.code].amount += s.amount;
  });

  const logs = [];
  logs.push('=== 总资产 ===');
  logs.push('豆总资产 = ¥' + data.douTotal.toFixed(2));
  logs.push('泽总资产 = ¥' + data.zeTotal.toFixed(2));
  logs.push('总资产 = ¥' + total.toFixed(2));
  logs.push('funds合计 = ¥' + data.funds.reduce((s,f) => s+f.amount, 0).toFixed(2));
  logs.push('stocks合计 = ¥' + data.stocks.reduce((s,st) => s+st.amount, 0).toFixed(2));

  logs.push('\n=== 各基金/ETF权重 ===');
  Object.entries(fmap).forEach(([code, info]) => {
    logs.push(code + ' ' + info.name + ': ¥' + info.amount.toFixed(2) + ' → 权重 ' + (info.amount/total*100).toFixed(2) + '%');
  });

  const smap = {};
  Object.entries(data.fundHoldings).forEach(([fc, holdings]) => {
    const fund = fmap[fc]; if (!fund) return;
    const w = fund.amount / (total||1);
    logs.push('\n--- ' + fc + ' ' + fund.name + ' (权重' + (w*100).toFixed(2) + '%) ---');
    holdings.forEach(h => {
      if (!smap[h.code]) smap[h.code] = { name: h.name, total: 0, sources: [] };
      const contribution = h.ratio * w;
      smap[h.code].total += contribution;
      smap[h.code].sources.push({ fundCode: fc, fundName: fund.name, ratio: contribution });
      logs.push('  ' + h.name + '(' + h.code + '): ' + h.ratio + '% × ' + (w*100).toFixed(2) + '% = ' + (contribution).toFixed(3) + '%');
    });
  });

  logs.push('\n=== 前10大集中度排名 ===');
  const result = Object.entries(smap).map(([code, info]) => ({ code, name: info.name, total: info.total, sources: info.sources }))
    .sort((a,b) => b.total - a.total);
  result.slice(0, 10).forEach((s, i) => {
    logs.push((i+1) + '. ' + s.name + '(' + s.code + '): ' + s.total.toFixed(3) + '%');
    s.sources.forEach(src => {
      logs.push('     ← ' + src.fundName + '(' + src.fundCode + '): ' + src.ratio.toFixed(3) + '%');
    });
  });
  window.__calcLog = logs.join('\n');

  return result;
}

function fmt(n) { return n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function fmtRatio(n) { return n.toFixed(2) + '%'; }

function getAdjusted(code, amount, profit, profitRate) {
  const adj = data.clearedAdjustments[code];
  if (!adj || !adj.amount) return { profit: profit || 0, profitRate: profitRate || 0 };
  const newProfit = (profit || 0) + (adj.amount || 0);
  const cost = (amount || 0) - (profit || 0);
  const newRate = cost > 0 ? (newProfit / cost) * 100 : 0;
  return { profit: newProfit || 0, profitRate: isNaN(newRate) ? 0 : newRate };
}

// ====== Canvas 图表 ======
const COLORS = ['#8B2942','#A03550','#B84D66','#C96B7D','#D68A97','#C9A962','#D4B87A','#DEC896','#A68B4B','#8A7340'];

function drawPie(canvas, data) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const cx = w/2, cy = h/2, r = Math.min(w, h)/2.5;

  ctx.clearRect(0,0,w,h);
  const total = data.reduce((s,d) => s+d.value, 0);
  if (total === 0) return;

  let start = -Math.PI/2;
  data.forEach((d, i) => {
    const angle = (d.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start+angle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // Label
    const mid = start + angle/2;
    const lr = r * 0.65;
    const lx = cx + Math.cos(mid) * lr;
    const ly = cy + Math.sin(mid) * lr;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const pct = (d.value / total * 100).toFixed(1);
    if (pct > 5) ctx.fillText(pct + '%', lx, ly);

    start += angle;
  });

  // Center hole
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.35, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function drawBar(canvas, data) {
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width, h = rect.height;
  const pad = { t: 20, r: 20, b: 40, l: 60 };
  const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

  ctx.clearRect(0,0,w,h);
  if (data.length === 0) return;

  const maxV = Math.max(...data.map(d => d.value));
  const gap = cw / data.length;
  const bw = Math.min(gap * 0.7, 40);

  // Y axis
  ctx.strokeStyle = '#e4e4e7';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w - pad.r, y); ctx.stroke();
    ctx.fillStyle = '#71717a';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText('¥' + ((maxV * i / 4) / 10000).toFixed(0) + '万', pad.l - 8, y);
  }

  // Bars
  data.forEach((d, i) => {
    const x = pad.l + i * gap + (gap - bw) / 2;
    const bh = d.value / maxV * ch;
    const y = pad.t + ch - bh;

    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.beginPath();
    ctx.roundRect(x, y, bw, bh, [4,4,0,0]);
    ctx.fill();

    // Label
    ctx.fillStyle = '#18181b';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(d.label, x + bw/2, pad.t + ch + 8);
  });
}

function applyPrivacyBlur() {
  removePrivacyBlur();
  const content = document.getElementById('content');
  if (!content) return;
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
  const processed = new Set();
  let node;
  while (node = walker.nextNode()) {
    const text = node.textContent || '';
    if (/¥/.test(text) || /\d.*%/.test(text) || /\d+万/.test(text)) {
      const p = node.parentElement;
      if (p && !processed.has(p)) {
        p.classList.add('privacy-sensitive');
        processed.add(p);
      }
    }
  }
  document.querySelectorAll('#content canvas').forEach(c => c.classList.add('privacy-sensitive'));
  const panel = document.getElementById('calcLogPanel');
  if (panel) panel.classList.add('privacy-sensitive');
}

function removePrivacyBlur() {
  document.querySelectorAll('.privacy-sensitive').forEach(el => el.classList.remove('privacy-sensitive'));

// 关键原则：localStorage 秒开，不阻塞页面渲染
async function loadDataFromServer() {
  // ===== 第一步：localStorage 优先（0ms，不阻塞） =====
  var local = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  var localDates = Object.keys(local).sort();
  var hasLocalData = localDates.length > 0 && localDates.some(function(d) {
    return (local[d].douTotal || 0) >= 100000 || (local[d].zeTotal || 0) >= 100000;
  });

  if (hasLocalData) {
    console.log('[加载] 使用本地数据（秒开）: ' + localDates.join(', '));
    try { logData('load_local', {dates: localDates.length, latestDate: localDates[localDates.length-1], source: 'localStorage'}); } catch(ex) {}
    cachedHistory = local;
    lastLoadTime = Date.now();
    var latestDate = localDates[localDates.length - 1];
    var latestSnap = local[latestDate];
    if (latestSnap) {
      data.funds = latestSnap.funds || data.funds;
      data.stocks = latestSnap.stocks || data.stocks;
      data.douTotal = latestSnap.douTotal || data.douTotal;
      data.zeTotal = latestSnap.zeTotal || data.zeTotal;
    }
    var corrected = correctETFClassification(data.funds, data.stocks);
    data.funds = corrected.funds;
    data.stocks = corrected.stocks;
    var el = document.getElementById('sidebarFooter');
    if (el) el.textContent = '数据更新日期: ' + latestDate;
    render();
  }

  // ===== 第二步：后台尝试服务器（完全非阻塞，setTimeout 0ms） =====
  setTimeout(function() {
    fetch('/api/data/load').then(function(res) {
      if (!res.ok) return;
      return res.json();
    }).then(function(serverData) {
      if (serverData && serverData.history && Object.keys(serverData.history).length > 0) {
        console.log('[加载] 服务器有新数据');
        cachedHistory = serverData.history;
        try { localStorage.setItem('portfolio_history', JSON.stringify(cachedHistory)); } catch(e) {}
        var serverDates = Object.keys(cachedHistory).sort();
        var latestServerDate = serverDates[serverDates.length - 1];

          data.funds = latestServerSnap.funds || data.funds;
          data.stocks = latestServerSnap.stocks || data.stocks;
          data.douTotal = latestServerSnap.douTotal || data.douTotal;
          data.zeTotal = latestServerSnap.zeTotal || data.zeTotal;
        }

        data.stocks = corrected2.stocks;
        var el2 = document.getElementById('sidebarFooter');
        if (el2) el2.textContent = '数据更新日期: ' + latestServerDate;
        render();
      }
    }).catch(function() { /* 服务器不可用，已从本地渲染 */ });
  }, 0);

  // 无本地数据时，阻塞等待服务器（首次加载）
  if (!hasLocalData) {
    try {
      const serverRes = await fetch('/api/data/load');
      if (serverRes.ok) {
        var serverData = await serverRes.json();
        if (serverData && serverData.history && Object.keys(serverData.history).length > 0) {
          console.log('[加载] 服务器数据已加载');
          cachedHistory = serverData.history;
          try { localStorage.setItem('portfolio_history', JSON.stringify(cachedHistory)); } catch(e) {}
          var svDates = Object.keys(cachedHistory).sort();
          var svLatest = svDates[svDates.length - 1];
          var svSnap = cachedHistory[svLatest];
          if (svSnap) {
            data.funds = svSnap.funds || data.funds;
            data.stocks = svSnap.stocks || data.stocks;
            data.douTotal = svSnap.douTotal || data.douTotal;
            data.zeTotal = svSnap.zeTotal || data.zeTotal;
          }
          var corrected3 = correctETFClassification(data.funds, data.stocks);
          data.funds = corrected3.funds;
          data.stocks = corrected3.stocks;
          var el3 = document.getElementById('sidebarFooter');
          if (el3) el3.textContent = '数据更新日期: ' + svLatest;
          render();
          return;
        }
      }
    } catch(e) { console.log('[加载] 服务器不可用'); }

    // 服务器也不可用：用硬编码数据回退
    console.log('[加载] 无数据源，使用硬编码默认值');
    if (!data.douTotal || data.douTotal < 100) {
      var estTotal = data.funds.reduce(function(s,f){return s+f.amount;},0) +
                     data.stocks.reduce(function(s,st){return s+st.amount;},0);
      data.douTotal = Math.round(estTotal * 0.45);
      data.zeTotal = Math.round(estTotal * 0.55);
    }
    render();
  }
}





// 初始化历史数据（不覆盖已有数据）
function initHistory() {
  const today = new Date().toISOString().slice(0, 10);
  
  let history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  
  // 若 localStorage 中没有 douTotal/zeTotal，从历史最近值带入
  if (!localStorage.getItem('portfolio_douTotal') || !localStorage.getItem('portfolio_zeTotal')) {
    const dates = Object.keys(history).sort().reverse();
    if (dates.length > 0) {
      const lastSnap = history[dates[0]];
      if (lastSnap) {
        if (!localStorage.getItem('portfolio_douTotal') && lastSnap.douTotal) {
          data.douTotal = lastSnap.douTotal;
          localStorage.setItem('portfolio_douTotal', lastSnap.douTotal);
        }
        if (!localStorage.getItem('portfolio_zeTotal') && lastSnap.zeTotal) {
          data.zeTotal = lastSnap.zeTotal;
          localStorage.setItem('portfolio_zeTotal', lastSnap.zeTotal);
        }
      }
    }
  }

  // 更新侧边栏日期显示
  const allDates = Object.keys(history).sort();
  if (allDates.length > 0) {
    const el = document.getElementById('sidebarFooter');
    if (el) el.textContent = '数据更新日期: ' + allDates[allDates.length - 1];
  }
}

// 全局历史数据缓存（优先服务器
var cachedHistory = null;
var lastLoadTime = 0;

async function getHistoryDates() {
  // 直接用内存缓存（页面加载时已初始化，切换页面不重新请求服务器）
  if (cachedHistory) {
    return Object.keys(cachedHistory).sort();
  }
  // 首次调用：从localStorage加载
  const history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  cachedHistory = history;
  lastLoadTime = Date.now();
  return Object.keys(history).sort();
}

async function loadSnapshot(dateStr) {
  if (!cachedHistory) await getHistoryDates(); // 确保有数据
  if (cachedHistory && cachedHistory[dateStr]) {
    return cachedHistory[dateStr];
  }
  // 回退到本地
  const history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  return history[dateStr] || null;
}

function exportAllData() {
  try {
    const history = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
    const exportData = {
      version: 1,
      exportTime: new Date().toISOString(),
      currentData: {
        douTotal: data.douTotal,
        zeTotal: data.zeTotal,
        funds: data.funds,
        stocks: data.stocks,
        clearedAdjustments: data.clearedAdjustments,
      },
      history: history,
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'portfolio_backup_' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('导出失败：' + e.message + '\n请检查浏览器是否支持文件下载');
  }
}

function validateDataIntegrity() {
  const warnings = [];
  const hasDou = typeof data.douTotal === 'number' && !isNaN(data.douTotal) && data.douTotal > 0;
  const hasZe = typeof data.zeTotal === 'number' && !isNaN(data.zeTotal) && data.zeTotal > 0;
  if (!hasDou && !hasZe) {
    warnings.push('暂无总资产数据，请先上传截图');
  }
  return warnings;
}

async function renderHistoryOverview(container) {
  const dates = await getHistoryDates();
  if (dates.length === 0) {
    container.innerHTML = '<div class="page-header"><h2>历史概览</h2></div><div class="card"><p style="color:var(--text-secondary);text-align:center;padding:40px 0">暂无历史数据</p></div>';
    return;
  }

  const snapshots = [];
  for (var i = 0; i < dates.length; i++) {
    const d = dates[i];
    const snap = await loadSnapshot(d);
    if (!snap) continue;
    const totalFunds = snap.funds.filter(f => f.code !== '511880').reduce((s,f) => s+f.amount, 0);
    const cashStock = snap.stocks.find(s => s.code === '511880');
    const cashStockAmt = cashStock ? cashStock.amount : 0;
    const totalStocks = snap.stocks.filter(s => s.code !== '511880').reduce((s,st) => s+st.amount, 0);
    const douTotal = snap.douTotal || 0;
    const zeTotal = snap.zeTotal || 0;
    const total = douTotal + zeTotal;
    const totalHoldings = totalFunds + totalStocks;
    const totalCash = total - totalHoldings;
    const aiCodes = { '159915': true, '510500': true, '159939': true, '512480': true, '515880': true };
    var allMerged = (snap.funds||[]).concat((snap.stocks||[]).filter(function(s){return s.code !== '511880';}));
    var aiHoldings = allMerged.filter(function(i) { return aiCodes[i.code]; }).reduce(function(s, i) { return s + (i.amount || 0); }, 0);
    var aiRatio = total > 0 ? aiHoldings / total * 100 : 0;
    var holdingsRatio = total > 0 ? totalHoldings / total * 100 : 0;
    var principal = getEffectivePrincipal(d);
    var profitRatio = principal > 0 ? (total - principal) / principal * 100 : 0;
    snapshots.push({ date: d, total: total, holdingsRatio: holdingsRatio, aiRatio: aiRatio, principal: principal, profitRatio: profitRatio });
  }
  const snapshotsDesc = snapshots.slice().reverse();

  container.innerHTML = `
    <div class="page-header"><h2>历史概览</h2></div>
    <div class="card">
      <div class="card-title">总资产趋势</div>
      <div class="chart-container" style="height:300px">
        <canvas id="trendChart" style="${snapshots.length < 2 ? 'display:none' : ''}"></canvas>
        <div id="trendEmptyMsg" style="${snapshots.length >= 2 ? 'display:none' : 'display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);font-size:14px'}">${snapshots.length === 0 ? '暂无历史数据，保存快照后趋势图将自动生成' : '需要至少2天数据才能生成趋势图，明天再来查看'}</div>
      </div>
    </div>
    <div class="card" style="padding:16px">
      <div class="card-title" style="font-size:16px;margin-bottom:8px">历史汇总 <span style="font-size:12px;font-weight:400;color:var(--text-secondary)">（共 ${snapshotsDesc.length} 条记录）</span></div>
      <table class="overview-table"><thead><tr>
        <th>日期</th><th>总资产</th><th>盈利占比</th><th>总持仓</th><th title="AI占比 = 创业板ETF + 中证500ETF + 信息技术ETF + 半导体ETF + 通信ETF">AI占比</th>
      </tr></thead><tbody>
        ${snapshotsDesc.map(s => `<tr>
          <td class="mono">${s.date.slice(5)}</td>
          <td class="mono" style="font-weight:600;line-height:1.2">${(s.total/10000).toFixed(0)}万${s.principal > 0 ? '<br><span style="font-size:7px;color:var(--text-secondary);font-weight:300">本金' + (s.principal/10000).toFixed(0) + '万</span>' : ''}</td>
          <td class="mono ${s.profitRatio >= 0 ? 'positive' : 'negative'}">${s.profitRatio >= 0 ? '+' : ''}${s.profitRatio.toFixed(0)}%</td>
          <td class="mono">${s.holdingsRatio.toFixed(0)}%</td>
          <td class="mono">${s.aiRatio.toFixed(0)}%</td>
        </tr>`).join('')}
      </tbody></table>
    </div>
  `;

  // 画趋势图
  if (snapshots.length >= 2) {
    requestAnimationFrame(() => {
    const canvas = document.getElementById('trendChart');
    if (!canvas) return;
    // 确保 canvas 可见才能取到正确尺寸
    const origDisplay = canvas.style.display;
    canvas.style.display = 'block';
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height;
    const pad = { t: 30, r: 20, b: 50, l: 80 };
    const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;

    ctx.clearRect(0, 0, w, h);
    const vals = snapshots.map(s => s.total);
    const maxV = Math.max(...vals);
    const minV = Math.min(...vals);
    const range = maxV - minV || 1;

    // 网格
    ctx.strokeStyle = '#e4e4e7';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.t + ch - (ch * i / 4);
      ctx.beginPath();
      ctx.moveTo(pad.l, y);
      ctx.lineTo(w - pad.r, y);
      ctx.stroke();
      ctx.fillStyle = '#71717a';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText('¥' + ((minV + range * i / 4) / 10000).toFixed(1) + '万', pad.l - 8, y);
    }

    // 折线
    const gap = cw / (snapshots.length - 1);
    ctx.beginPath();
    ctx.strokeStyle = '#8B2942';
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    snapshots.forEach((s, i) => {
      const x = pad.l + i * gap;
      const y = pad.t + ch - ((s.total - minV) / range) * ch;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // 填充渐变色
    ctx.lineTo(pad.l + (snapshots.length - 1) * gap, pad.t + ch);
    ctx.lineTo(pad.l, pad.t + ch);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
    grad.addColorStop(0, 'rgba(139,41,66,0.15)');
    grad.addColorStop(1, 'rgba(139,41,66,0.01)');
    ctx.fillStyle = grad;
    ctx.fill();

    // 数据点 + 标签（只显示首、尾、中间三个日期）
    var midIdx = Math.floor((snapshots.length - 1) / 2);
    snapshots.forEach((s, i) => {
      var showLabel = (i === 0 || i === snapshots.length - 1 || i === midIdx);
      const x = pad.l + i * gap;
      const y = pad.t + ch - ((s.total - minV) / range) * ch;
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#8B2942';
      ctx.fill();
      if (showLabel) {
        ctx.fillStyle = '#18181b';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(s.date.slice(5), x, pad.t + ch + 8);
      }
    });
    });
  }
}

// 图片压缩函数
async function compressImage(file, maxWidth=1600, maxHeight=1200, quality=0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        // 缩放图片（不低于模型最小尺寸要求）
        if (width > maxWidth || height > maxHeight) {
          const ratio = Math.min(maxWidth / width, maxHeight / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        
        canvas.width = width;
        canvas.height = height;
        
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // 转换为JPEG格式压缩
        canvas.toBlob((blob) => {
          const reader2 = new FileReader();
          reader2.onload = (e2) => {
            const originalSize = file.size;
            const compressedSize = blob.size;
            const compressedUrl = e2.target.result;
            const ratio = (1 - compressedSize / originalSize) * 100;
            console.log(`图片压缩: ${(originalSize/1024).toFixed(1)}KB → ${(compressedSize/1024).toFixed(1)}KB (节省 ${ratio.toFixed(1)}%)`);
            resolve(compressedUrl);
          };
          reader2.readAsDataURL(blob);
        }, 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleHistoryFilesSelected(input) {
  if (!input.files || input.files.length === 0) return;
  const statusEl = document.getElementById('historyUploadStatus');
  statusEl.innerHTML = '<div class="parse-status loading">⏳ 正在压缩图片...</div>';

  try {
    const names = [];
    for (const file of input.files) {
      const compressedDataUrl = await compressImage(file);
      historyUploadedImages.push({ dataUrl: compressedDataUrl, name: file.name });
      names.push(file.name + '(' + Math.round(file.size / 1024) + 'KB)');
      renderHistoryUploadList();
    }
    try { clientLog('INFO', 'upload', '历史图片已加载: ' + historyUploadedImages.length + ' 张', { images: names }); } catch(ex) {}
    statusEl.innerHTML = '';
  } catch (e) {
    try { clientLog('ERROR', 'upload', '历史图片压缩失败: ' + e.message, { stack: (e.stack || '').substring(0, 200) }); } catch(ex) {}

function validateParsedData(parsed) {
  const errors = [];
  const warnings = [];

  if (!parsed.douTotal || isNaN(parsed.douTotal)) {
    errors.push('未提取到豆账户总资产');
  } else if (parsed.douTotal < 10000 || parsed.douTotal > 100000000) {
    errors.push('豆账户总资产金额异常：' + parsed.douTotal);
  }

  if (!parsed.zeTotal || isNaN(parsed.zeTotal)) {
    errors.push('未提取到泽账户总资产');
  } else if (parsed.zeTotal < 10000 || parsed.zeTotal > 100000000) {
    errors.push('泽账户总资产金额异常：' + parsed.zeTotal);
  }

  if (!parsed.funds || !Array.isArray(parsed.funds) || parsed.funds.length === 0) {
    errors.push('未提取到场外基金持仓数据');
  } else {
    if (parsed.funds.length < 3) warnings.push('场外基金数量偏少（' + parsed.funds.length + '只），请确认截图完整性');
    parsed.funds.forEach((f, i) => {
      // 缺少代码/名称降级为警告（AI可能只识别出部分字段）
      if (!f.code || !f.name) {
        warnings.push('场外基金第' + (i+1) + '条缺少代码或名称(' + (f.name||'未知名称') + ')，已尝试从名称恢复');
      } else {
        var codePattern = /^\d{5,6}$/;
        if (!codePattern.test(f.code)) {
          // 代码格式异常降级为警告
          warnings.push('场外基金代码格式异常: ' + f.code + ' (' + (f.name||'未知') + ')');
        }
      }
      if (!f.amount || isNaN(f.amount)) errors.push('场外基金"' + (f.name||'未知') + '"缺少持仓金额');
      else if (f.amount < 0) warnings.push('场外基金"' + (f.name||'未知') + '"金额为负数');
      if (typeof f.profit === 'undefined' || isNaN(f.profit)) errors.push('场外基金"' + (f.name||'未知') + '"缺少持仓收益');
    });
  }

  // 场内持仓 (stocks) 为空是合理的 - AI 可能把所有持仓都归入 funds
  // 只要有 funds 就不报错，stocks 为空时从 funds 中智能迁移
  var hasStocksData = parsed.stocks && Array.isArray(parsed.stocks) && parsed.stocks.length > 0;
  
  // 自动从 funds 迁移场内 ETF 到 stocks（如果 stocks 为空但 funds 中存在 ETF）
  if (!hasStocksData && parsed.funds && Array.isArray(parsed.funds) && parsed.funds.length > 0) {
    var migratedToStocks = [];
    var remainingFunds = [];
    parsed.funds.forEach(function(f) {
      if (f.code && KNOWN_FUND_CODES && KNOWN_FUND_CODES[f.code]) {
        migratedToStocks.push(f);
      } else {
        remainingFunds.push(f);
      }
    });
    if (migratedToStocks.length > 0) {
      parsed.funds = remainingFunds;
      parsed.stocks = migratedToStocks;
      hasStocksData = true;
      try { clientLog('INFO', 'parser', '从 funds 自动迁移 ' + migratedToStocks.length + ' 只 ETF 到 stocks', 
                    { codes: migratedToStocks.map(function(x) { return x.code; }) }); } catch(ex) {}
    }
  }

  if (!hasStocksData) {
    warnings.push('场内持仓数据为空（AI可能将所有持仓归入场外基金），已尝试智能迁移');
  } else {
    var has511880 = parsed.stocks.some(function(s) { return s.code === '511880'; });
    if (!has511880) warnings.push('场内持仓中未找到银华日利(511880)，现金计算可能不准确');
    parsed.stocks.forEach(function(s, i) {
      // 缺少代码/名称降级为警告（AI可能只识别出部分字段）
      if (!s.code || !s.name) {
        warnings.push('场内持仓第' + (i+1) + '条缺少代码或名称(' + (s.name||'未知名称') + ')，已尝试从名称恢复');
      } else {
        var codePattern = /^\d{5,6}$/;
        var alphaPattern = /^[A-Z0-9]{1,5}$/;
        if (!codePattern.test(s.code) && !alphaPattern.test(s.code)) {
          // 代码格式异常时降级为警告
          warnings.push('场内持仓代码格式异常: ' + s.code + ' (' + (s.name||'未知') + ')');
        }
      }
      if (!s.amount || isNaN(s.amount)) errors.push('场内持仓"' + (s.name||'未知') + '"缺少持仓金额');
      else if (s.amount < 0) warnings.push('场内持仓"' + (s.name||'未知') + '"金额为负数');
    });
  }

  // 总金额检查（考虑 stocks 可能为空的情况）
  var totalHoldings = (parsed.funds||[]).reduce(function(s,f){return s+(f.amount||0);},0) + 
    (parsed.stocks||[]).reduce(function(s,st){return s+(st.amount||0);},0);
  var total = (parsed.douTotal||0) + (parsed.zeTotal||0);
  if (total > 0 && totalHoldings > total * 1.3) {
    errors.push('持仓总金额超出总资产30%以上，数据可能存在错误');
  }

  // ===== 二次检查: 增强校验 =====
  var info = [];

  // 1. 金额一致性检查
  var checkFundsSum = (parsed.funds||[]).reduce(function(s,f){return s+(f.amount||0);},0);
  var checkStocksSum = (parsed.stocks||[]).reduce(function(s,st){return s+(st.amount||0);},0);
  var checkTotal = checkFundsSum + checkStocksSum;
  var accountTotal = (parsed.douTotal||0) + (parsed.zeTotal||0);
  if (accountTotal > 0) {
    var ratio = checkTotal / accountTotal;
    info.push('金额一致性: ' + (ratio*100).toFixed(1) + '% (持仓' + Math.round(checkTotal/10000) + '万 / 资产' + Math.round(accountTotal/10000) + '万)');
    if (ratio < 0.5 || ratio > 1.5) warnings.push('持仓总额与账户总资产偏差过大(' + (ratio*100).toFixed(0) + '%)，图片可能不完整');
  }

  // 2. 收益率合理性检查
  var allHolderItems = (parsed.funds||[]).concat(parsed.stocks||[]);
  var abnormalRates = allHolderItems.filter(function(item) {
    return item.profitRate && (item.profitRate > 500 || item.profitRate < -100);
  });
  if (abnormalRates.length > 0) {
    var codes = abnormalRates.map(function(i){return i.code + '(' + i.profitRate.toFixed(0) + '%)';}).join(', ');
    warnings.push('异常收益率: ' + codes);
  }

  // 3. 511880 存在性
  var has511880InStocks = (parsed.stocks||[]).some(function(s){return s.code === '511880';});
  if (!has511880InStocks && (parsed.stocks||[]).length > 0) {
    warnings.push('场内持仓中未找到银华日利(511880)，现金/总资产计算可能不准确');
  }

  // 4. 代码格式全量校验
  var badCodes = [];
  allHolderItems.forEach(function(item) {
    if (!item.code) return;
    var codeStr = String(item.code);
    if (!/^\d{5,6}$/.test(codeStr) && !/^[A-Z0-9]{1,5}$/.test(codeStr)) {
      badCodes.push(codeStr + '(' + (item.name||'?') + ')');
    }
  });
  if (badCodes.length > 0) warnings.push('代码格式异常: ' + badCodes.join(', '));

  // 5. 空字段检测
  var missingFields = [];
  allHolderItems.forEach(function(item, i) {
    if (!item.name) missingFields.push('第'+(i+1)+'项: 名称为空');
    if (!item.code) missingFields.push('第'+(i+1)+'项: 代码为空');
    if (!item.amount || isNaN(item.amount)) missingFields.push('第'+(i+1)+'项: 金额为空');
  });
  if (missingFields.length > 0) warnings.push('字段缺失: ' + missingFields.slice(0,5).join('; '));

  // 6. 利润+金额一致性 (利润绝对值不应超过金额)
  allHolderItems.forEach(function(item) {
    if (item.profit && item.amount && Math.abs(item.profit) > Math.abs(item.amount) * 1.2) {
      warnings.push(item.code + ' ' + (item.name||'') + ' 收益(¥' + Math.round(item.profit).toLocaleString() + ')异常偏高，金额仅¥' + Math.round(item.amount).toLocaleString());
    }
  });

  // 7. 图片数量提示
  if (info.length > 0) warnings.unshift('校验报告: ' + info.join(' | '));

  return { valid: errors.length === 0, errors: errors, warnings: warnings };
}

async function saveHistorySnapshotForDate(dateStr, parsed, images) {
  // 不保存图片，只保存解析后的数据（2年数据约5MB，localStorage够用）
  var fullHistory = {};
  try {
    const res = await fetch('/api/data/load');
    if (res.ok) {
      const serverData = await res.json();
      fullHistory = (serverData && serverData.history) || {};
    }
  } catch(e) {}

  // 合并本地作为兜底
  const localHistory = JSON.parse(localStorage.getItem('portfolio_history') || '{}');
  const allDates = new Set([...Object.keys(fullHistory), ...Object.keys(localHistory)]);
  const merged = {};
  allDates.forEach(date => { merged[date] = fullHistory[date] || localHistory[date]; });
  fullHistory = merged;

  fullHistory[dateStr] = {
    funds: parsed.funds || [],
    stocks: parsed.stocks || [],
    douTotal: parsed.douTotal || 0,
    zeTotal: parsed.zeTotal || 0,
    snapshotDate: dateStr
  };

  console.log('[保存] 保存日期 ' + dateStr);

  try {
    clientLog('INFO', 'data', '写入快照: date=' + dateStr + ', funds=' + (parsed.funds || []).length + ', stocks=' + (parsed.stocks || []).length);
  } catch(ex) {}

  await saveToServer(fullHistory);

  // 更新缓存
  cachedHistory = fullHistory;
  try {
    localStorage.setItem('portfolio_history', JSON.stringify(fullHistory));
  } catch(e) {
    console.log('[警告] localStorage写入失败，服务器已保存');
  }
}

async function saveToServer(history) {
  var payload = {
    history: history,
    currentData: {
      funds: data.funds,
      stocks: data.stocks,
      douTotal: data.douTotal,
      zeTotal: data.zeTotal
    },
    douTotal: data.douTotal,
    zeTotal: data.zeTotal
  };
  try {
    const res = await fetch('/api/data/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      const resp = await res.json();
      console.log('[服务器已保存！快照数：', resp.snapshots);
      try { clientLog('INFO', 'data', '服务器保存成功, snapshots=' + (resp.snapshots || 0), { status: res.status }); } catch(ex) {}
      return true;
    } else {
      console.log('[保存] 服务器返回非200:', res.status);
      try { clientLog('ERROR', 'data', '服务器保存失败 HTTP ' + res.status, { status: res.status }); } catch(ex) {}
      return false;
    }
  } catch(e) {
    console.log('[保存] 服务器失败:', e);
    try { clientLog('ERROR', 'data', '服务器保存异常: ' + e.message, { stack: (e.stack || '').substring(0, 200) }); } catch(ex) {}
    return false;
  }
}

async function doParsing(uploadImages, statusElId, btnId, targetDate, closeCb) {
  var statusEl = document.getElementById(statusElId);
  var btnEl = document.getElementById(btnId);
  if (!statusEl || !btnEl) {
    try { clientLog('ERROR', 'parser', '解析所需DOM元素缺失: status=' + !!statusEl + ', btn=' + !!btnEl); } catch(ex) {}
    return;
  }
  var t0 = Date.now();
  statusEl.innerHTML = '<div class="parse-status loading">⏳ 正在调用 qwen-vl-max 解析 ' + uploadImages.length + ' 张图片，请稍候...</div>';
  btnEl.disabled = true;

  try {
    var promptText = '你是一个严格的金融数据提取工具。请按以下规则处理下面的4张图片。\n\n' +

'提取内容：\n' +
'  - 总资产 = 图中最大的数字（在"总资产(元)"标签下方，通常是几十万级别）\n' +

'    ※ 资产：名称下方"资产"标签右侧的大数字（如"278,221.73"）\n' +
'    ※ 持仓收益：卡片右侧区域，寻找带"+"或"-"符号的数字，通常是红色（盈利）或绿色（亏损）\n' +

'---------- 类型B：泽总资产（橙色背景，无持仓列表） ----------\n' +
'识别特征：橙色背景，顶部有"*公泽"或类似用户名，中央显示大数字，下方有"活期宝""基金"等分项但无持仓卡片\n' +
'提取内容：\n' +
'  - 总资产 = 图中最显著的大数字（在"总资产(元)"下方，通常是几十万级别）\n' +
'  - 注意：图中还有"基金"、"活期宝"等分项数字，不要提取这些，只取最顶部的"总资产"大数字\n\n' +
'---------- 类型C：豆总资产 + 持仓（白色背景，带总资产大数字和持仓表格） ----------\n' +
'识别特征：白色背景，顶部显示"普通 信用 期权 模拟"标签和资金账号（如"3070****5052"），\n' +

'    ※ 牢记：名称和金额是同一行的垂直关系（名称在上、金额在下），不是跨行的水平关系\n' +
'    ※ 豆账户持仓表格的典型顺序（从上到下）：\n' +
'       1. 创业板ETF（金额最大，通常30万以上）\n' +
'       2. 中概互联网ETF\n' +
'       3. 半导体ETF\n' +
'       4. 沪深300ETF\n' +
'       5. 通信ETF\n' +
'       6. 白酒基金LOF\n' +
'       7. 中证500ETF\n' +
'       8. 信息技术ETF\n' +
'       9. 银华日利ETF\n' +
'       10. 特变电工\n' +
'    ※ 特别注意：创业板ETF在表格第一行，金额最大（30万+），不要与第三行的沪深300ETF混淆\n\n' +
'---------- 类型D：豆持仓（白色背景，纯表格） ----------\n' +
'识别特征：白色背景，顶部显示"普通 信用 期权 模拟"标签，下方是纯持仓表格，无总资产大数字\n' +
'提取内容：与类型C的持仓表格提取规则完全相同\n\n' +
'【已知持仓名称列表（OCR模糊时从此选择纠正）】\n' +
'  沪深300ETF、创业板ETF、招商中证白酒指数(LOF)A\n' +
'  银华日利ETF、中概互联网ETF、中概互联ETF、华宝医疗ETF联接A、兴全沪深300指数(LOF)A\n' +
'  信息技术ETF、中证500ETF、白酒基金LOF、半导体ETF、通信ETF、特变电工\n' +
'  常见OCR错误纠正：\n' +
'    "创益诚/创业版/创业板ET"→创业板ETF，"恺英技术"→信息技术ETF，"中证800"→中证500ETF\n' +
'    "中概互联"和"中概互联网ETF"是同一个，统一用"中概互联ETF"\n' +
'    "白酒基金LOF"和"招商中证白酒指数(LOF)A"是同一个，统一用"招商中证白酒指数(LOF)A"\n' +
'    "信息技术ET"→信息技术ETF，"中概互联网E"→中概互联ETF，"沪深300ET"→沪深300ETF\n\n' +
'【提取后校验规则】\n' +
'  - 必须提取到两个账户的总资产：豆账户总资产通常上百万，泽账户总资产通常几十万\n' +
'  - 检查持仓数量是否与图片中实际卡片/表格行数匹配\n' +
'  - 检查名称是否均为已知列表中的名称\n' +
'  - 检查金额数字格式：如"278,221.73"去掉逗号后为278221.73\n' +
'  - 检查是否有遗漏的持仓（如缺少创业板ETF）\n\n' +
'最终JSON格式（只输出JSON，不要任何其他文字或markdown标记）：\n' +
'{\n' +
'  "douTotal": 数字或null,\n' +
'  "zeTotal": 数字或null,\n' +
'  "douHoldings": [{"name":"名称","amount":数字,"profit":数字}],\n' +
'  "zeHoldings": [{"name":"名称","amount":数字,"profit":数字}]\n' +
'}\n' +
'缺少某类数据时对应字段返回null或[]。';

    // 构建content块：文本+图片
    var contentBlocks = [{ text: promptText }];
    for (var i = 0; i < uploadImages.length; i++) {
      contentBlocks.push({ image: uploadImages[i].dataUrl });
    }

    // 通过服务器代理调用百炼API（API Key仅在后端server.cjs，前端不暴露）
    var response, json, apiChannel = 'proxy';

    try {
      response = await fetch('/api/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: contentBlocks })
      });
    } catch(proxyErr) {
      response = null;
    }

    if ((!response || response.status === 405) && apiBaseFallback) {
      try {
        response = await fetch(apiBaseFallback + '/api/parse', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: contentBlocks })
        });
        apiChannel = 'tunnel';
      } catch(e) {
        response = null;
      }
    }

    if (!response || !response.ok) {
      var errMsg = '解析服务暂不可用' + (response ? '（HTTP ' + response.status + '）' : '（网络异常）');
      try { clientLog('ERROR', 'parser', errMsg, { channel: apiChannel, status: response ? response.status : 0 }); } catch(ex) {}
      throw new Error(errMsg);
    }

    try { clientLog('INFO', 'parser', 'AI API 响应 ' + response.status + ' (通道=' + apiChannel + ', 耗时=' + (Date.now() - t0) + 'ms)', { targetDate: targetDate }); } catch(ex) {}

    json = await response.json();

    // 处理代理返回的错误
    if (json.error) {
      try { clientLog('ERROR', 'parser', 'API 返回错误: ' + json.error); } catch(ex) {}
      throw new Error('API 错误: ' + json.error);
    }

    // 处理DashScope返回的错误码
    if (json.code) {
      var errMsg = 'DashScope错误 [' + json.code + ']: ' + (json.message || '未知错误').substring(0, 300);
      try { clientLog('ERROR', 'parser', errMsg, { code: json.code }); } catch(ex) {}
      throw new Error(errMsg);
    }

    var choices = json.output && json.output.choices;
    if (!choices || !choices.length) {
      var errMsg = 'API 返回格式异常，无 choices: ' + JSON.stringify(json).substring(0, 200);
      try { clientLog('ERROR', 'parser', errMsg); } catch(ex) {}
      throw new Error(errMsg);
    }

    var assistantContent = choices[0].message.content;
    var replyText = '';

    if (Array.isArray(assistantContent)) {
      for (var m = 0; m < assistantContent.length; m++) {
        if (assistantContent[m].text) replyText += assistantContent[m].text;
      }
    } else if (typeof assistantContent === 'string') {
      replyText = assistantContent;
    } else {
      var errMsg = '无法解析模型返回的 content 格式: ' + JSON.stringify(assistantContent).substring(0, 200);
      try { clientLog('ERROR', 'parser', errMsg); } catch(ex) {}
      throw new Error(errMsg);
    }

    if (!replyText) {
      try { clientLog('ERROR', 'parser', '模型返回空内容'); } catch(ex) {}
      throw new Error('模型返回了空内容，请重试');
    }
    var jsonMatch = replyText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) {
      var errMsg = '解析失败：未找到有效JSON响应。响应内容: ' + replyText.substring(0, 200);
      try { clientLog('ERROR', 'parser', errMsg, { rawPreview: replyText.substring(0, 100) }); } catch(ex) {}
      throw new Error(errMsg);
    }

    var parsed = JSON.parse(jsonMatch[0]);

    // ===== 新两账户合并逻辑 =====
    // 从名称匹配代码（三层匹配：精确→后缀剥离→模糊匹配）
    function matchCode(name) {
      var n = (name || '').trim();
      var code = FUND_NAME_TO_CODE[n];
      if (!code && n.endsWith('ETF')) code = FUND_NAME_TO_CODE[n.slice(0, -3)];
      if (!code && n.endsWith('LOF')) code = FUND_NAME_TO_CODE[n.slice(0, -3)];
      if (!code && n.includes('ETF')) { var b = n.replace(/\s*ETF$/, ''); code = FUND_NAME_TO_CODE[b]; }
      if (!code && n.includes('联接')) { var ns = n.replace(/联接[AC]$/, ''); code = FUND_NAME_TO_CODE[ns]; }
      if (!code) code = fuzzyMatchCode(n);
      return code || '';
    }

    // 模糊匹配：AI OCR可能误读汉字，用字符重叠率+子串匹配+前后缀纠正
    function fuzzyMatchCode(name) {
      var KNOWNS = [
        { code: '159915', names: ['创业板ETF','创业板'] },
        { code: '510300', names: ['沪深300ETF','沪深300','300ETF'] },
        { code: '163407', names: ['兴全沪深300指数LOF','兴全沪深300','沪深300指数'] },
        { code: '510500', names: ['中证500ETF','中证500','500ETF'] },
        { code: '161725', names: ['招商中证白酒指数LOF','白酒基金','中证白酒'] },
        { code: '162412', names: ['华宝医疗ETF联接A','华宝医疗','医疗ETF'] },
        { code: '513050', names: ['中概互联ETF','中概互联','中概互联网ETF'] },
        { code: '159939', names: ['信息技术ETF','科技ETF','信息ETF'] },
        { code: '512480', names: ['半导体ETF','半导体','芯片ETF'] },
        { code: '515880', names: ['通信ETF','通信设备ETF','通信'] },
      ];
      var best = null;
      var bestScore = 0;
      var nSuffix = name.endsWith('ETF') ? 'ETF' : (name.endsWith('LOF') ? 'LOF' : name.endsWith('联接A') ? '联接' : '');
      var chars = name.replace(/ETF|LOF|联接[AC]?|指数|\(|\)|A$/g, '').split('');
      for (var i = 0; i < KNOWNS.length; i++) {
        for (var j = 0; j < KNOWNS[i].names.length; j++) {
          var kn = KNOWNS[i].names[j];
          var kSuffix = kn.endsWith('ETF') ? 'ETF' : (kn.endsWith('LOF') ? 'LOF' : kn.endsWith('联接A') ? '联接' : '');
          var kChars = kn.replace(/ETF|LOF|联接[AC]?|指数|\(|\)|A$/g, '').split('');
          var overlap = 0;
          for (var ci = 0; ci < chars.length; ci++) {
            if (kChars.indexOf(chars[ci]) >= 0) overlap++;
          }
          var baseScore = overlap / Math.max(chars.length, kChars.length);
          var suffixBonus = (nSuffix && nSuffix === kSuffix) ? 0.20 : 0;
          var substrBonus = 0;
          var kStr = kChars.join('');
          for (var s = 0; s < chars.length - 1; s++) {
            var sub = chars.slice(s, s + 2).join('');
            if (kStr.indexOf(sub) >= 0) { substrBonus = 0.25; break; }
          }
          var score = baseScore + suffixBonus + substrBonus;
          if (score > bestScore && score >= 0.45) { bestScore = score; best = KNOWNS[i].code; }
        }
      }
      if (best) {
        try { clientLog('INFO', 'parser', '模糊匹配纠正: "' + name + '" → ' + best + ' (置信度=' + (bestScore*100).toFixed(0) + '%)', {}); } catch(ex) {}
      }
      return best || '';
    }

    // 合并 douHoldings 和 zeHoldings
    var merged = {};
    function addHoldings(holdings, account) {
      (holdings || []).forEach(function(h) {
        var code = matchCode(h.name);
        if (!code) code = 'OTHER_' + (h.name || 'unknown');
        if (!merged[code]) { merged[code] = { code: code, name: h.name, amount: 0, profit: 0 }; }
        merged[code].amount += (h.amount || 0);
        merged[code].profit += (h.profit || 0);
      });
    }
    addHoldings(parsed.douHoldings, 'dou');
    addHoldings(parsed.zeHoldings, 'ze');

    // 记录解析结果摘要到日志
    var mergerNames = Object.values(merged).map(function(m) { return m.code + '=' + m.name; });
    try { clientLog('INFO', 'parser', '解析完成: 豆=' + (parsed.douTotal||0).toFixed(0) + ' 泽=' + (parsed.zeTotal||0).toFixed(0) + ' 持仓数=' + Object.keys(merged).length + ' 项目=' + mergerNames.join('|'), { mergedNames: mergerNames }); } catch(ex) {}

    // 分类映射
    Object.values(merged).forEach(function(m) {
      m.type = HARDCODED_TYPE_MAP[m.code] || '其他';
    });

    // 现金 = 总资产 - 持仓合计（511880除外，那是现金等价物）
    var totalHoldings = Object.values(merged).filter(function(m) { return m.code !== '511880'; }).reduce(function(s, m) { return s + (m.amount || 0); }, 0);
    var douTotal = parsed.douTotal || 0;
    var zeTotal = parsed.zeTotal || 0;
    var total = douTotal + zeTotal;
    var totalCash = Math.max(0, total - totalHoldings);

    // 计算收益率
    Object.values(merged).forEach(function(m) {
      if (m.amount > 0 && m.profit !== 0) {
        m.profitRate = parseFloat((m.profit / (m.amount - m.profit) * 100).toFixed(2));
      } else {
        m.profitRate = 0;
      }
    });

    // 转回 funds/stocks 格式（兼容历史数据结构）
    var allItems = Object.values(merged).filter(function(m) { return m.code !== '511880'; }).sort(function(a, b) { return (b.amount || 0) - (a.amount || 0); });
    
    var newFunds = [];
    var newStocks = [];
    allItems.forEach(function(m) {
      if (HARDCODED_TYPE_MAP[m.code] && m.code !== '511880') {
        newFunds.push({ code: m.code, name: m.name, type: m.type, amount: m.amount, profit: m.profit, profitRate: m.profitRate });
      } else {
        newStocks.push({ code: m.code, name: m.name, shares: 0, price: 0, amount: m.amount, profit: m.profit, profitRate: m.profitRate });
      }
    });
    // 511880 特殊处理
    var cashItem = merged['511880'];
    if (cashItem) {
      newStocks.push({ code: '511880', name: cashItem.name, shares: 0, price: 0, amount: cashItem.amount, profit: cashItem.profit, profitRate: cashItem.profitRate });
    }

    var parsed = { funds: newFunds, stocks: newStocks, douTotal: douTotal, zeTotal: zeTotal, totalCash: totalCash };

    // 简单校验
    var allHolderItems = (parsed.funds || []).concat(parsed.stocks || []);
    var hasData = allHolderItems.length > 0;
    var hasDou = douTotal > 0, hasZe = zeTotal > 0;
    var warnings = [];
    if (!hasDou || !hasZe) warnings.push('总资产缺失：豆=' + (hasDou ? '有' : '无') + ' 泽=' + (hasZe ? '有' : '无'));
    if (!hasData) warnings.push('未提取到任何持仓数据');

    var validation = { valid: hasData && douTotal > 0 && zeTotal > 0, errors: (!hasData ? ['未提取到任何持仓数据'] : []), warnings: warnings };

    if (!validation.valid) {
      var errHtml = '<div class="parse-status error"><strong>数据校验不通过，以下内容缺失或异常：</strong><br>';
      validation.errors.forEach(function(e) { errHtml += '❌ ' + e + '<br>'; });
      if (validation.warnings.length > 0) {
        errHtml += '<br><strong>警告：</strong><br>';
        validation.warnings.forEach(function(w) { errHtml += '⚠ ' + w + '<br>'; });
      }
      errHtml += '<br><small>请检查上传的截图是否完整，补充缺失的图片后重新上传</small></div>';
      statusEl.innerHTML = errHtml;
      btnEl.disabled = false;
      try {
        // 记录AI原始响应摘要，便于排查幻觉名称
        var rawSummary = {
          douTotal: parsed.douTotal, zeTotal: parsed.zeTotal,
          douNames: (parsed.douHoldings || []).map(function(h) { return h.name; }),
          zeNames: (parsed.zeHoldings || []).map(function(h) { return h.name; }),
          mergedNames: Object.values(merged).map(function(m) { return m.code + ':' + m.name; })
        };
        clientLog('WARN', 'parser', '数据校验不通过: targetDate=' + targetDate + ', errors=' + validation.errors.length + ', AI返回=' + JSON.stringify(rawSummary).substring(0, 500),
          { errors: validation.errors.slice(0, 5), rawSummary: rawSummary });
      } catch(ex) {}
      return;
    }

    // 更新 data
    if (parsed.douTotal && !isNaN(parsed.douTotal)) {
      data.douTotal = parsed.douTotal;
      localStorage.setItem('portfolio_douTotal', parsed.douTotal);
    }
    if (parsed.zeTotal && !isNaN(parsed.zeTotal)) {
      data.zeTotal = parsed.zeTotal;
      localStorage.setItem('portfolio_zeTotal', parsed.zeTotal);
    }
    if (parsed.funds && Array.isArray(parsed.funds) && parsed.funds.length > 0) {
      data.funds = parsed.funds;
    }
    if (parsed.stocks && Array.isArray(parsed.stocks) && parsed.stocks.length > 0) {
      data.stocks = parsed.stocks;
    }

    // 自动纠正：ETF 基金从 stocks 移入 funds
    var corrected = correctETFClassification(data.funds, data.stocks);
    data.funds = corrected.funds;
    data.stocks = corrected.stocks;

    await saveHistorySnapshotForDate(targetDate, parsed, uploadImages);

    var parseMeta = {
      targetDate: targetDate,
      imageCount: uploadImages.length,
      fundsCount: (parsed.funds || []).length,
      stocksCount: (parsed.stocks || []).length,
      douTotal: parsed.douTotal,
      zeTotal: parsed.zeTotal,
      errors: validation.errors,
      warnings: validation.warnings,
      mergedNames: (parsed.funds || []).concat(parsed.stocks || []).map(function(i) { return i.code + '=' + i.name; })
    };
    try { logData('parse_complete', parseMeta); } catch(ex) {}
    try { clientLog('INFO', 'parser', '解析成功 ' + targetDate + ': funds=' + parseMeta.fundsCount + ' stocks=' + parseMeta.stocksCount + ' 持仓=' + parseMeta.mergedNames.join('|'), parseMeta); } catch(ex) {}

    var msg = '更新日期：' + targetDate + '<br>';
    if (parsed.douTotal) msg += '豆总资产: ¥' + parsed.douTotal.toLocaleString() + '<br>';
    if (parsed.zeTotal) msg += '泽总资产: ¥' + parsed.zeTotal.toLocaleString() + '<br>';
    if (parsed.funds && parsed.funds.length > 0) msg += '提取到场外基金 ' + parsed.funds.length + ' 条<br>';
    if (parsed.stocks && parsed.stocks.length > 0) msg += '提取到场内持仓 ' + parsed.stocks.length + ' 条<br>';
    msg += '数据已保存<br>';

    // 和数据对比
    var prevDates = cachedHistory ? Object.keys(cachedHistory).filter(function(d) { return d < targetDate; }).sort() : [];
    if (prevDates.length > 0) {
      var prevDate = prevDates[prevDates.length - 1];
      var prevSnap = cachedHistory[prevDate];
      if (prevSnap) {
        var prevTotal = (prevSnap.douTotal||0) + (prevSnap.zeTotal||0);
        var currTotal = (parsed.douTotal||0) + (parsed.zeTotal||0);
        var diff = currTotal - prevTotal;
        var diffText = diff >= 0 ? '+' + diff.toLocaleString() : diff.toLocaleString();
        msg += '<br><small style="color:var(--text-secondary)">较 ' + prevDate + '：总资产 ' + (diff >= 0 ? '↑' : '↓') + ' ¥' + diffText;
        var prevHoldings = (prevSnap.funds||[]).concat((prevSnap.stocks||[]).filter(function(s){return s.code !== '511880';}));
        var currHoldings = (parsed.funds||[]).concat((parsed.stocks||[]).filter(function(s){return s.code !== '511880';}));
        if (prevHoldings.length !== currHoldings.length) {
          msg += '，持仓项数 ' + prevHoldings.length + '→' + currHoldings.length;
        }
        msg += '</small><br>';
      }
    }

    var allWarnings = [];
    allWarnings = allWarnings.concat(validation.warnings);
    var currCodes = {};
    (parsed.funds||[]).concat(parsed.stocks||[]).forEach(function(i) { currCodes[i.code] = i.name; });
    var unknownCodes = Object.keys(currCodes).filter(function(c) { return c.startsWith('OTHER_'); });
    if (unknownCodes.length > 0) {
      allWarnings.push('存在 ' + unknownCodes.length + ' 个未识别的持仓（' + unknownCodes.map(function(c){return currCodes[c];}).join('、') + '），已归入"其他"类型');
    }
    var allHolderItems = (parsed.funds||[]).concat(parsed.stocks||[]);
    var zeroProfit = allHolderItems.filter(function(i) { return !i.profit || Math.abs(i.profit) < 0.01; });
    if (zeroProfit.length > 0 && allHolderItems.length > 1) {
      allWarnings.push(zeroProfit.length + ' 项持仓收益为0，可能未提取到收益数据');
    }

    if (allWarnings.length > 0) {
      msg += '<br><small style="color:#a16207">⚠ ' + allWarnings.join('<br>⚠ ') + '</small>';
    }

    statusEl.innerHTML = '<div class="parse-status success">✅ 数据已更新！请确认无误后关闭<br>' + msg + '<br><small style="color:var(--text-secondary)">点击右上角 ✕ 关闭</small></div>';

    uploadImages.length = 0;
    await loadDataFromServer();
    setTimeout(function() { render(); }, 500);

  } catch(e) {
    try { clientLog('ERROR', 'parser', '解析异常: ' + e.message, { stack: (e.stack || '').substring(0, 300) }); } catch(ex) {}
    statusEl.innerHTML = '<div class="parse-status error">❌ ' + e.message + '</div>';
  } finally {
    if (btnEl) btnEl.disabled = false;
  }
}

function startHistoryParsing() {
  var dateEl = document.getElementById('historyUploadDate');
  var targetDate = dateEl ? dateEl.value : '';
  if (!targetDate) {
    var el = document.getElementById('historyUploadStatus');
    if (el) el.innerHTML = '<div class="parse-status error">请先选择指定的历史日期</div>';
    return;
  }
  if (historyUploadedImages.length === 0) {
    var el = document.getElementById('historyUploadStatus');
    if (el) el.innerHTML = '<div class="parse-status error">请先上传至少一张截图</div>';
    return;
  }
  try { clientLog('INFO', 'parser', '开始解析历史截图: targetDate=' + targetDate + ', images=' + historyUploadedImages.length); } catch(ex) {}
  doParsing(historyUploadedImages, 'historyUploadStatus', 'btnHistoryParse', targetDate, closeHistoryUploadPanel);
}

// Init
function debounce(fn, ms) {
  let timer;
  return function() { clearTimeout(timer); timer = setTimeout(fn, ms); };
}
window.addEventListener('hashchange', function() { render(); });
window.addEventListener('load', async function() {
  initHistory();
  // 加载 API 回退配置（生产域名 OSS 无后端时，自动使用 CF Tunnel API 地址）
  try {
    var configResp = await fetch('/api_config.json', { cache: 'no-cache' });
    if (configResp.ok) {
      var apiConfig = await configResp.json();
      apiBaseFallback = apiConfig.api_base || '';
    }
  } catch(e) {}
  // 初始化默认本金：6月3日~15日统一为1391339
  var pMap = getPrincipalMap();
  if (!pMap['2026-06-03']) {
    setPrincipal('2026-06-03', 1391339);
  }
  await loadDataFromServer();
  // 每次打开页面默认开启隐私模式（隐藏金额）
  localStorage.setItem('portfolio_privacy', '1');
  applyPrivacy();
  applySidebarCollapse();
  closeAccountDropdown();
  await render();
});
window.addEventListener('resize', () => {
  const route = getRoute();
  if (route === '/history/overview' || route === '/entry' || route === '/') render();
});
</script>

<div class="upload-overlay" id="uploadOverlayHistory">
  <div class="upload-dialog">
    <div class="card-title" style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <span>上传持仓截图解析数据</span>
      <button class="expand-btn" onclick="closeHistoryUploadPanel()" title="关闭">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <label style="font-weight:500;white-space:nowrap">指定日期：</label>
      <input type="date" id="historyUploadDate" style="padding:8px 16px;border:1px solid var(--border);border-radius:8px;font-size:14px;flex:1;max-width:200px" value="">
    </div>
    <div class="upload-slot" id="historyUploadDropZone" onclick="document.getElementById('historyUploadFileInput').click()" style="margin-bottom:12px">
      <span class="placeholder" id="historyUploadPlaceholder">点击或拖拽上传持仓截图（支持多选）</span>
    </div>
    <div id="historyUploadFileList" style="max-height:150px;overflow-y:auto;margin-bottom:8px"></div>
    <input type="file" id="historyUploadFileInput" accept="image/*" multiple style="display:none" onchange="handleHistoryFilesSelected(this)">
    <div id="historyUploadStatus"></div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px">
      <button class="btn" onclick="closeHistoryUploadPanel()">取消</button>
      <button class="btn btn-upload" id="btnHistoryParse" onclick="startHistoryParsing()">开始解析</button>
    </div>
  </div>
</div>

<!-- 调试面板：?debug=true 激活 -->
<div id="debugPanel" style="display:none;position:fixed;bottom:0;left:0;right:0;height:70vh;background:#1a1a2e;color:#e0e0e0;font-family:monospace;font-size:12px;z-index:9999;overflow:auto;padding:16px;border-top:2px solid #00ff88">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:16px;font-weight:bold;color:#00ff88">📋 调试日志</span>
    <div style="display:flex;gap:8px">
      <button onclick="refreshDebugLogs()" style="padding:4px 12px;border:1px solid #00ff88;background:transparent;color:#00ff88;border-radius:4px;cursor:pointer">刷新</button>
      <button onclick="clearDebugLogs()" style="padding:4px 12px;border:1px solid #ff4444;background:transparent;color:#ff4444;border-radius:4px;cursor:pointer">清空</button>
      <button onclick="copyDebugLogs()" style="padding:4px 12px;border:1px solid #888;background:transparent;color:#888;border-radius:4px;cursor:pointer">复制</button>
      <button onclick="document.getElementById('debugPanel').style.display='none'" style="padding:4px 12px;border:1px solid #666;background:transparent;color:#666;border-radius:4px;cursor:pointer">关闭</button>
    </div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap">
    <label><input type="checkbox" value="parser" checked onchange="filterDebugLogs()"> parser</label>
    <label><input type="checkbox" value="upload" checked onchange="filterDebugLogs()"> upload</label>
    <label><input type="checkbox" value="data" checked onchange="filterDebugLogs()"> data</label>
    <label><input type="checkbox" value="error" checked onchange="filterDebugLogs()"> error</label>
    <label><input type="checkbox" value="audit" checked onchange="filterDebugLogs()"> audit</label>
    <label><input type="checkbox" value="perf" checked onchange="filterDebugLogs()"> perf</label>
    <select onchange="filterDebugLogs()" id="debugLevelFilter" style="background:#333;color:#e0e0e0;border:1px solid #555;border-radius:4px;padding:2px 8px">
      <option value="">全部级别</option>
      <option value="ERROR">ERROR</option>
      <option value="WARN">WARN</option>
      <option value="INFO">INFO</option>
    </select>
  </div>
  <div id="debugLogContent" style="white-space:pre-wrap;line-height:1.6"></div>
</div>

<script>
(function() {
  if (location.search.indexOf('debug=true') >= 0 || location.search.indexOf('logs=true') >= 0) {
    document.getElementById('debugPanel').style.display = 'block';
    refreshDebugLogs();
  }
})();
function refreshDebugLogs() {
  var logs = window.getClientLogs ? window.getClientLogs() : [];
  var html = '';
  var categories = {};
  document.querySelectorAll('#debugPanel input[type=checkbox]:checked').forEach(function(cb) { categories[cb.value] = true; });
  var levelFilter = document.getElementById('debugLevelFilter').value;
  logs.forEach(function(l) {
    if (!categories[l.category]) return;
    if (levelFilter && l.level !== levelFilter) return;
    var levelColor = l.level === 'ERROR' ? '#ff4444' : l.level === 'WARN' ? '#ffaa00' : '#00ff88';
    var ts = (l.ts || '').substring(11, 19);
    html += '<div style="border-bottom:1px solid #333;padding:4px 0"><span style="color:' + levelColor + ';font-weight:bold">[' + l.level + ']</span> ';
    html += '<span style="color:#888">' + ts + '</span> ';
    html += '<span style="color:#66ccff">' + (l.category || '') + '</span> ';
    html += (l.message || '') + '</div>';
  });
  document.getElementById('debugLogContent').innerHTML = html || '<div style="color:#888;padding:20px;text-align:center">暂无日志</div>';
}
function clearDebugLogs() {
  try { localStorage.removeItem('portfolio_client_logs'); } catch(e) {}
  refreshDebugLogs();
}
function copyDebugLogs() {
  var logs = window.getClientLogs ? window.getClientLogs() : [];
  var text = logs.map(function(l) {
    return '[' + l.ts + '] [' + l.level + '] [' + l.category + '] ' + l.message;
  }).join('\n');
  navigator.clipboard.writeText(text).then(function() {
    document.getElementById('debugLogContent').innerHTML = '<div style="color:#00ff88;padding:20px;text-align:center">✅ 已复制 ' + logs.length + ' 条日志到剪贴板</div>';
  }).catch(function() {
    document.getElementById('debugLogContent').innerHTML = '<div style="color:#ff4444;padding:20px;text-align:center">❌ 复制失败</div>';
  });
}
function filterDebugLogs() { refreshDebugLogs(); }
</script>
