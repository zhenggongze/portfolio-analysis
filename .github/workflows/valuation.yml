name: 指数估值日报推送

on:
  schedule:
    # 北京时间 09:30（UTC 01:30），周一至周五
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  valuation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 安装依赖
        run: pip install requests brotli
      - name: 运行估值工作流
        run: python valuation/valuation_workflow.py --push --detail-url "https://zhenggongze.github.io/portfolio-analysis/valuation/reports/valuation_detail_$(date +%Y%m%d).html"
      - name: 提交HTML报告到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add valuation/reports/valuation_detail_*.html valuation/logs/valuation_*_status.json
          git diff --staged --quiet || git commit -m "Auto-update valuation report $(date +%Y%m%d)"
          git push
      - name: 上传日志
        uses: actions/upload-artifact@v4
        with:
          name: valuation-logs
          path: valuation/logs/
